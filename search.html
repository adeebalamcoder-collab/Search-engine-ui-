<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>hey — Atkyn Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    html, body {
      font-family: Arial, Helvetica, sans-serif;
      background: #F5F6F7;
      color: #000;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior-y: contain;
      -webkit-overflow-scrolling: touch;
    }
    img, svg { will-change: auto; }
    .r-card, .nav-tab, .r-title, .r-snip, .r-dots, .pg, .hamburger { -webkit-tap-highlight-color: transparent; }

    /* ══════════════════════════ HEADER ══════════════════════════ */
    .header { position: relative; background: #fff; }
    .h-row1 { display: flex; align-items: center; justify-content: flex-end; height: 64px; padding: 0 14px 0 0; }
    .hamburger {
      border: none; background: none; cursor: pointer;
      display: grid; grid-template-columns: 1fr 1fr; gap: 2.5px;
      padding: 12px; border-radius: 50%; position: relative; overflow: hidden;
      -webkit-tap-highlight-color: transparent; isolation: isolate;
    }
    .hamburger::before {
      content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0;
      border-radius: 50%; background: rgba(0,0,0,0.08); transform: translate(-50%, -50%);
      transition: width 0.32s ease, height 0.32s ease; z-index: -1;
    }
    .hamburger:active::before { width: 130%; height: 130%; transition: width 0.05s ease, height 0.05s ease; }
    .hamburger span { display: block; width: 10px; height: 10px; background: linear-gradient(145deg, #5a5a5a, #2e2e2e); border-radius: 3px; }

    .h-row2 { padding: 0 12px 10px 12px; }
    .pill-wrap { position: relative; width: 100%; }
    .pill {
      display: flex; align-items: center; height: 53px; border: 1.7px solid #0072B1;
      border-radius: 9999px; padding: 0 14px 0 5px; background: #fff; gap: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .pill-logo { flex-shrink: 0; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; user-select: none; position: relative; }
    .pill-logo svg { width: 100%; height: 100%; display: block; }
    .pill input {
      flex: 1; min-width: 0; border: none; outline: none; background: transparent;
      font-size: 1.125rem; font-family: Arial, Helvetica, sans-serif; color: #000; caret-color: #0072B1;
    }
    .pill input[type=search]::-webkit-search-cancel-button { display: none; }
    .pill input[type=search]::-webkit-search-decoration { display: none; }
    .pill-x {
      display: none; border: none; background: none; cursor: pointer; color: #9e9e9e;
      line-height: 0; padding: 8px; flex-shrink: 0; align-items: center; justify-content: center;
      border-radius: 50%; position: relative; overflow: hidden; -webkit-tap-highlight-color: transparent; isolation: isolate;
    }
    .pill-x::before {
      content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0; border-radius: 50%;
      background: rgba(0,0,0,0.08); transform: translate(-50%, -50%); transition: width 0.32s ease, height 0.32s ease; z-index: -1;
    }
    .pill-x:active::before { width: 160%; height: 160%; transition: width 0.05s ease, height 0.05s ease; }
    .pill-x.show { display: flex; }
    .pill-x svg { width: 26px; height: 26px; }

    /* ══════════════════════════ TABS ══════════════════════════ */
    .h-nav { display: flex; align-items: center; height: auto; padding: 2px 14px 2px 14px; gap: 2px; overflow-x: auto; scrollbar-width: none; background: #fff; }
    .h-nav::-webkit-scrollbar { display: none; }
    .nav-tab {
      display: inline-flex; align-items: center; justify-content: center; padding: 4px 12px 8px;
      font-size: 1.05rem; font-weight: 500; white-space: nowrap; text-decoration: none; cursor: pointer;
      border-radius: 6px; border: none; background: #fff; color: #333; letter-spacing: 0; line-height: 1;
      text-transform: capitalize; -webkit-font-smoothing: antialiased; box-shadow: none; outline: none;
      -webkit-tap-highlight-color: transparent; transition: transform 0.1s ease, background 0.1s ease, color 0.1s ease; user-select: none;
      position: relative;
    }
    .nav-tab:active { transform: scale(0.93); background: #e8e8e8; }
    .nav-tab.on { background: #fff; color: #111; font-weight: 700; }
    .nav-tab.on:active { transform: scale(0.93); background: #e8e8e8; }

    body { padding-top: 0; }
    .page { padding-bottom: 16px; -webkit-overflow-scrolling: touch; contain: layout style paint; transform: translateZ(0); }

    /* ══════════════════════════ KNOWLEDGE PANEL (Yandex-style) ══════════════════════════ */
    .kg-card {
      background: #fff; border-radius: 14px; padding: 16px 16px 18px 16px;
      margin: 6px 8px 0 8px;
    }
    .kg-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; margin-bottom: 12px; }
    .kg-title { font-size: 1.55rem; font-weight: 800; color: #111; line-height: 1.18; }
    .kg-type { font-size: 0.92rem; font-weight: 400; color: #70757a; margin-top: 4px; }
    .kg-image-box {
      flex-shrink: 0; max-width: 130px; max-height: 130px; border-radius: 12px;
      background: #f1f3f4; display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .kg-image { max-width: 130px; max-height: 130px; width: auto; height: auto; object-fit: contain; display: block; }
    .kg-desc { font-size: 0.96rem; line-height: 1.62; color: #202124; margin-bottom: 14px; }
    .kg-source {
      display: inline-flex; align-items: center; gap: 8px; background: #f1f3f4;
      border-radius: 9999px; padding: 6px 14px 6px 6px; margin-bottom: 16px;
      text-decoration: none; -webkit-tap-highlight-color: transparent;
    }
    .kg-source-fav { width: 22px; height: 22px; border-radius: 50%; background: #fff center/16px 16px no-repeat; flex-shrink: 0; }
    .kg-source-text { font-size: 0.85rem; color: #444; font-weight: 500; }
    .kg-attrs { display: flex; flex-direction: column; gap: 7px; }
    .kg-attr-row { font-size: 0.9rem; line-height: 1.5; color: #202124; }
    .kg-attr-label { font-weight: 700; margin-right: 4px; }
    .kg-attr-value a { color: #08519C; text-decoration: none; }
    .kg-attr-value a:hover { text-decoration: underline; }

    /* ══════════════════════════ IMAGES TAB — masonry grid ══════════════════════════ */
    #imagesContainer { background: #fff; padding: 10px 6px 8px; }
    .img-grid { column-width: 150px; column-gap: 8px; }
    @media (min-width: 700px) { .img-grid { column-width: 200px; column-gap: 10px; } }
    @media (min-width: 900px) { .img-grid { column-width: 240px; column-gap: 12px; } }
    .img-item { display: block; break-inside: avoid; margin-bottom: 8px; border-radius: 16px; overflow: hidden; background: #f1f3f4; text-decoration: none; box-shadow: none; }
    .img-item img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 16px; box-shadow: none; }
    .img-skel {
      break-inside: avoid; margin-bottom: 8px; border-radius: 16px;
      background: linear-gradient(90deg, #eceff1 25%, #f6f7f8 37%, #eceff1 63%);
      background-size: 400% 100%; animation: skel-sweep 1.4s ease infinite;
    }
    @keyframes skel-sweep { 0% { background-position: 100% 50%; } 100% { background-position: 0 50%; } }
    .img-loader { display: none; align-items: center; justify-content: center; gap: 6px; padding: 22px 0 30px; }
    .img-loader.show { display: flex; }
    .img-loader-dot { width: 8px; height: 8px; border-radius: 50%; background: #b0b6c0; animation: img-bounce 1s ease-in-out infinite; }
    .img-loader-dot:nth-child(2) { animation-delay: 0.15s; }
    .img-loader-dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes img-bounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.5; } 40% { transform: translateY(-6px); opacity: 1; } }
    .img-end-msg { text-align: center; font-size: 0.85rem; color: #9aa0ab; padding: 6px 0 26px; }
    @media (min-width: 900px) { #imagesContainer { max-width: none; padding: 16px 0 8px; } }


    .card { background: #fff; border-radius: 14px; padding: 12px 14px 14px 14px; margin: 6px 8px 0 8px; position: relative; overflow: visible; content-visibility: auto; contain-intrinsic-size: 0 120px; }
    .card-body { display: flex; align-items: flex-start; gap: 14px; }
    .card-content { flex: 1; min-width: 0; }
    .r-thumb { flex-shrink: 0; width: 84px; height: 84px; border-radius: 10px; object-fit: contain; background: #f1f3f4; display: block; }
    @media (min-width: 900px) { .r-thumb { width: 110px; height: 110px; } }

    .r-host { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .r-fav { width: 30px; height: 30px; min-width: 30px; min-height: 30px; border-radius: 50%; flex-shrink: 0; background: #f1f3f4 center/20px 20px no-repeat; display: block; }
    .r-host-text { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
    .r-domain { font-size: 0.875rem; font-weight: 400; color: #222; line-height: 1.35; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .r-path { font-size: 0.775rem; color: #888; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .r-dots {
      flex-shrink: 0; border: none; background: none; cursor: pointer; color: #aaa; line-height: 0;
      padding: 6px; align-self: flex-start; border-radius: 50%; position: relative; overflow: hidden;
      -webkit-tap-highlight-color: transparent; isolation: isolate; margin: -6px -6px 0 0;
    }
    .r-dots::before {
      content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0; border-radius: 50%;
      background: rgba(0,0,0,0.08); transform: translate(-50%, -50%); transition: width 0.32s ease, height 0.32s ease; z-index: -1;
    }
    .r-dots:active::before { width: 160%; height: 160%; transition: width 0.05s ease, height 0.05s ease; }
    .r-dots svg { width: 20px; height: 20px; }

    .r-title { display: block; font-size: 1.065rem; font-weight: 700; color: #08519C; text-decoration: none; line-height: 1.35; margin: 5px 0 5px; -webkit-tap-highlight-color: transparent; }
    .r-title:hover { text-decoration: underline; }
    .r-snip {
      display: block; font-size: 0.92rem; color: #202A44; line-height: 1.58; text-decoration: none;
      cursor: pointer; margin: 0 -8px; padding: 2px 8px; border-radius: 8px;
      -webkit-tap-highlight-color: transparent; transition: background 0.15s ease;
    }
    .r-snip:active { background: rgba(0,0,0,0.08); transition: background 0.05s ease; }
    .r-snip b, .r-snip .searchmatch { font-weight: 700; color: #202A44; font-style: normal; }

    /* ══════════════════════════ RESULT STATS / SKELETON / NO-RESULTS ══════════════════════════ */
    .result-stats { font-size: 0.82rem; color: #70757a; padding: 10px 16px 2px; }
    @media (min-width: 900px) { .result-stats { padding: 14px 0 0; max-width: 640px; } }
    .no-results { text-align: center; padding: 60px 24px; color: #5f6368; }
    .skel-card { background: #fff; border-radius: 14px; padding: 12px 14px 14px 14px; margin: 6px 8px 0 8px; }
    @media (min-width: 900px) { .skel-card { max-width: 640px; margin: 20px 0 0 0; padding: 16px 20px 18px; border-radius: 10px; } }
    .skel-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .skel-dot { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(90deg, #eceff1 25%, #f6f7f8 37%, #eceff1 63%); background-size: 400% 100%; animation: skel-sweep 1.3s ease infinite; }
    .skel-line { height: 12px; border-radius: 6px; background: linear-gradient(90deg, #eceff1 25%, #f6f7f8 37%, #eceff1 63%); background-size: 400% 100%; animation: skel-sweep 1.3s ease infinite; margin-bottom: 8px; }
    .skel-title { width: 58%; height: 15px; }
    .skel-host { width: 30%; height: 10px; margin-bottom: 0; }
    .skel-snip { width: 100%; }
    .skel-snip.short { width: 68%; margin-bottom: 0; }
    .no-results__icon { color: #c2c6cf; margin-bottom: 12px; }
    .no-results__title { font-size: 1.15rem; font-weight: 700; color: #202124; margin-bottom: 6px; }
    .no-results__sub { font-size: 0.92rem; color: #70757a; }

    /* ══════════════════════════ FOOTER ══════════════════════════ */
    .end-foot { text-align: left; padding: 14px 24px 16px; }
    .end-foot__eyebrow { font-size: 1.15rem; font-weight: 700; color: #8a8f99; margin-bottom: 6px; }
    .end-foot__title { font-size: 1.85rem; font-weight: 800; color: #c2c6cf; line-height: 1.2; margin-bottom: 16px; }
    .end-foot__btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 13px 28px;
      border: none; border-radius: 10px; background: #0072B1; color: #fff; font-size: 1.05rem; font-weight: 700;
      letter-spacing: 0.1px; text-decoration: none; cursor: pointer; -webkit-tap-highlight-color: transparent;
      box-shadow: 0 2px 0 rgba(0,80,124,0.4); transition: background 0.15s ease, transform 0.08s ease, box-shadow 0.15s ease;
    }
    .end-foot__btn:active { background: #00628f; transform: scale(0.96); box-shadow: 0 1px 0 rgba(0,80,124,0.4); }
    .end-brand { margin: 0; padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px)); text-align: center; }
    .end-brand__logo { font-size: 1.1rem; font-weight: 800; color: #111; letter-spacing: 0.3px; margin-bottom: 3px; }
    .end-brand__by { font-size: 0.78rem; color: #9aa0ab; margin-bottom: 6px; }
    .end-brand__copy { font-size: 0.75rem; color: #aeb3bd; }

    /* ══════════════════════════ PAGINATION ══════════════════════════ */
    .pager { display: flex; align-items: center; justify-content: center; gap: 0; padding: 20px 8px 14px; }
    .pg {
      min-width: 38px; height: 38px; border: none; background: none; cursor: pointer; border-radius: 50%;
      font-size: 0.9rem; color: #555; display: flex; align-items: center; justify-content: center;
      font-family: Arial, sans-serif; position: relative; overflow: hidden; -webkit-tap-highlight-color: transparent; isolation: isolate;
    }
    .pg::before {
      content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0; border-radius: 50%;
      background: rgba(0,0,0,0.08); transform: translate(-50%, -50%); transition: width 0.32s ease, height 0.32s ease; z-index: -1;
    }
    .pg:active::before { width: 160%; height: 160%; transition: width 0.05s ease, height 0.05s ease; }
    .pg.on::before { background: rgba(255,255,255,0.25); }
    .pg.on { background: #0072B1; color: #fff; font-weight: 700; }
    .pg:hover:not(.on):not([disabled]) { background: #f0f0f0; }
    .pg[disabled] { opacity: .3; cursor: default; }
    .pg-dot { color: #888; font-size: 0.9rem; padding: 0 3px; }

    /* ══════════════════════════ SUGGESTIONS ══════════════════════════ */
    .sug {
      position: absolute; top: calc(100% + 3px); left: 0; right: 0; background: #fff; border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,.18); overflow: hidden; z-index: 200; opacity: 0; pointer-events: none;
      transform: translateY(-4px); transition: opacity .12s, transform .12s;
    }
    .sug.show { opacity: 1; pointer-events: all; transform: none; }
    .sug-row {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; font-size: 0.9375rem;
      border: none; background: none; width: 100%; text-align: left; font-family: Arial, sans-serif; color: #000;
    }
    .sug-row + .sug-row { border-top: 1px solid #f0f2f4; }
    .sug-row:hover, .sug-row.hl { background: #f8f9fa; }
    .sug-ico { color: #bdc1c6; line-height: 0; flex-shrink: 0; }
    .sug-ico svg { width: 16px; height: 16px; }

    .hamburger-desktop-slot { display: none; }

    /* ══════════════════════════ DESKTOP ══════════════════════════ */
    @media (min-width: 900px) {
      body { background: #fff; }
      .h-row1 { display: none; }
      .header { border-bottom: 1px solid #e6e6e6; }
      .header-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; gap: 24px; padding: 14px 24px; }
      .h-row2 { padding: 0; flex-shrink: 0; width: 480px; }
      .pill { height: 46px; border-width: 1.5px; }
      .pill-logo { width: 34px; height: 34px; }
      .pill input { font-size: 1rem; }
      .pill-x svg { width: 20px; height: 20px; }
      .h-nav { padding: 0; gap: 4px; flex: 1; overflow: visible; }
      .nav-tab { font-size: 0.9rem; padding: 8px 12px; border-radius: 8px; }
      .nav-tab:hover { background: #f0f0f0; }
      .nav-tab.on { background: #e8f2fa; color: #0072B1; }
      .nav-tab.on:hover { background: #dcecf7; }
      .hamburger-desktop-slot { display: flex; flex-shrink: 0; }
      .page { max-width: 900px; margin: 0 auto; padding: 0 24px 32px; }
      body.tab-images .page { max-width: 1400px; }
      .kg-card { max-width: 640px; margin: 20px 0 0 0; padding: 20px 24px 22px; border-radius: 10px; }
      .kg-image-box { max-width: 150px; max-height: 150px; }
      .kg-image { max-width: 150px; max-height: 150px; }
      .kg-title { font-size: 1.75rem; }
      .card {
        max-width: 640px; margin: 20px 0 0 0; padding: 16px 20px 18px; border-radius: 10px;
        box-shadow: none; transition: box-shadow 0.15s ease;
      }
      .card:hover { box-shadow: 0 1px 8px rgba(0,0,0,0.08); }
      .r-title { font-size: 1.2rem; }
      .r-snip { font-size: 1rem; cursor: default; }
      .r-snip:active, .r-snip:hover { background: transparent; }
      .end-foot, .end-brand { max-width: 640px; }
      .pager { justify-content: flex-start; padding-left: 4px; }
    }
  </style>
</head>
<body>
<header class="header">
  <div class="h-row1">
    <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span><span></span></button>
  </div>
  <div class="header-inner">
    <div class="h-row2">
      <div class="pill-wrap">
        <div class="pill">
          <div class="pill-logo">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <circle cx="50" cy="50" r="49" fill="#ffffff"/>
              <circle cx="46" cy="46" r="22" fill="none" stroke="#0072B1" stroke-width="9"/>
              <line x1="62" y1="62" x2="72" y2="72" stroke="#0072B1" stroke-width="9.5" stroke-linecap="round"/>
            </svg>
          </div>
          <input id="q" type="search" value="hey" autocomplete="off" spellcheck="false">
          <button class="pill-x show" id="xBtn">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
        <div class="sug" id="sugBox"></div>
      </div>
    </div>
    <nav class="h-nav">
      <a href="#" class="nav-tab on" data-tab="web">web</a>
      <a href="#" class="nav-tab" data-tab="ai">AI</a>
      <a href="#" class="nav-tab" data-tab="images">images</a>
      <a href="#" class="nav-tab" data-tab="video">video</a>
      <a href="#" class="nav-tab" data-tab="maps">maps</a>
      <a href="#" class="nav-tab" data-tab="news">news</a>
    </nav>
    <button class="hamburger hamburger-desktop-slot" aria-label="Menu"><span></span><span></span><span></span><span></span></button>
  </div>
</header>

<div class="page">
  <div class="result-stats" id="resultStats"></div>
  <div id="kgContainer"></div>
  <div id="resultsContainer"></div>
  <div class="pager" id="pager"></div>
  <div id="imagesContainer" style="display:none;">
    <div class="img-grid" id="imgGrid"></div>
    <div class="img-loader" id="imgLoader">
      <div class="img-loader-dot"></div><div class="img-loader-dot"></div><div class="img-loader-dot"></div>
    </div>
  </div>
  <div id="imgSentinel" style="height:1px;"></div>
  <div class="end-foot">
    <div class="end-foot__eyebrow">That's all for now!</div>
    <div class="end-foot__title">Didn't find what you're looking for?</div>
    <a href="javascript:void(0)" class="end-foot__btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" width="17" height="17"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Search Now
    </a>
  </div>
  <div class="end-brand">
    <div class="end-brand__logo">Atkyn</div>
    <div class="end-brand__by">by Canacot Systems</div>
    <div class="end-brand__copy">© 2026 Atkyn. All rights reserved.</div>
  </div>
</div>

<script>
  const inp = document.getElementById('q');
  const xBtn = document.getElementById('xBtn');
  const sugBox = document.getElementById('sugBox');
  const resultsContainer = document.getElementById('resultsContainer');
  const kgContainer = document.getElementById('kgContainer');
  const resultStats = document.getElementById('resultStats');
  const pagerEl = document.getElementById('pager');
  const imagesContainer = document.getElementById('imagesContainer');
  const imgGrid = document.getElementById('imgGrid');
  const imgLoader = document.getElementById('imgLoader');
  const endFootEl = document.querySelector('.end-foot');
  const endBrandEl = document.querySelector('.end-brand');
  let active = -1, tmr;
  const PAGE_SIZE = 10;
  const MAX_IMAGES = 300;
  let currentQuery = '';
  let currentPage = 1;
  let activeTab = 'web';

  // ── images tab state ──
  let imgLoading = false, imgDone = false, imgTotalLoaded = 0, imgFirstLoad = true, imagesLoadedForQuery = null;
  let imgSeenUrls = new Set();
  let imgCombos = [], imgComboIdx = 0;

  // Serper's "page" param on /images doesn't reliably deepen results the way
  // web search does — a single call tends to return whatever Google's cache
  // has for that query/region. To get real additional unique images we cycle
  // through different regions (gl) and pages, since Google Images genuinely
  // returns different sets per region — not duplicated content.
  function buildImgCombos() {
    const regions = [
      { gl: 'us', hl: 'en' }, { gl: 'in', hl: 'en' }, { gl: 'gb', hl: 'en' },
      { gl: 'ca', hl: 'en' }, { gl: 'au', hl: 'en' }, { gl: 'de', hl: 'de' },
      { gl: 'fr', hl: 'fr' }, { gl: 'jp', hl: 'ja' }, { gl: 'br', hl: 'pt' },
      { gl: 'it', hl: 'it' }, { gl: 'es', hl: 'es' }, { gl: 'nl', hl: 'nl' }
    ];
    const combos = [];
    for (let page = 1; page <= 3; page++) {
      regions.forEach(r => combos.push({ page, gl: r.gl, hl: r.hl }));
    }
    return combos;
  }

  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', e => {
      e.preventDefault();
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('on'));
      tab.classList.add('on');
      switchTab(tab.dataset.tab);
    });
  });

  function switchTab(tab) {
    activeTab = tab;
    document.body.classList.toggle('tab-images', tab === 'images');
    if (tab === 'images') {
      [resultStats, kgContainer, resultsContainer, pagerEl].forEach(el => el && (el.style.display = 'none'));
      if (endFootEl) endFootEl.style.display = 'none';
      if (endBrandEl) endBrandEl.style.display = 'none';
      imagesContainer.style.display = 'block';
      if (imagesLoadedForQuery !== currentQuery) {
        resetImages();
        renderImgSkeleton();
        loadMoreImages();
      }
    } else {
      imagesContainer.style.display = 'none';
      [resultStats, kgContainer, resultsContainer, pagerEl].forEach(el => el && (el.style.display = ''));
      if (endFootEl) endFootEl.style.display = '';
      if (endBrandEl) endBrandEl.style.display = '';
    }
  }

  function resetImages() {
    imgLoading = false; imgDone = false; imgTotalLoaded = 0; imgFirstLoad = true;
    imgSeenUrls = new Set();
    imgCombos = buildImgCombos();
    imgComboIdx = 0;
    imgGrid.innerHTML = '';
    const oldMsg = document.getElementById('imgEndMsg');
    if (oldMsg) oldMsg.remove();
  }

  function renderImgSkeleton() {
    const heights = [170, 230, 145, 200, 255, 165, 215, 185, 150, 225, 190, 160];
    imgGrid.innerHTML = heights.map(h => `<div class="img-skel" style="height:${h}px"></div>`).join('');
  }

  function appendImages(images) {
    const frag = document.createDocumentFragment();
    images.forEach((img, idx) => {
      // use the small thumbnail for the grid (fast, Google-style) — the full-res
      // image only ever loads if the person clicks through to the source
      const gridSrc = img.thumbnailUrl || img.imageUrl;
      if (!gridSrc) return;
      const a = document.createElement('a');
      a.className = 'img-item';
      a.href = img.link || img.imageUrl;
      a.target = '_blank';
      a.rel = 'noopener';
      // reserve the exact box size up-front using Serper's reported dimensions
      // so nothing shifts once the image actually loads (no "earthquake")
      const w = img.thumbnailWidth || img.imageWidth, h = img.thumbnailHeight || img.imageHeight;
      if (w && h) a.style.aspectRatio = w + ' / ' + h;
      else a.style.aspectRatio = '1 / 1';
      const im = document.createElement('img');
      im.loading = 'lazy';
      im.decoding = 'async';
      im.setAttribute('fetchpriority', (imgTotalLoaded + idx) < 8 ? 'high' : 'low');
      im.alt = img.title || '';
      im.referrerPolicy = 'no-referrer';
      // if the image fails to load (dead link / hotlink-blocked), remove the
      // whole card cleanly instead of showing a broken-image icon + alt text
      im.onerror = () => { a.remove(); checkFillViewport(); };
      im.src = gridSrc;
      a.appendChild(im);
      frag.appendChild(a);
    });
    imgGrid.appendChild(frag);
  }

  // if too many images in a batch failed and the page/grid is left short,
  // immediately pull another batch instead of waiting for the user to scroll
  let backfillTimer = null;
  function checkFillViewport() {
    if (imgLoading || imgDone) return;
    clearTimeout(backfillTimer);
    backfillTimer = setTimeout(() => {
      if (activeTab === 'images' && document.body.scrollHeight <= window.innerHeight + 400) {
        loadMoreImages();
      }
    }, 100);
  }

  async function loadMoreImages() {
    if (imgLoading || imgDone) return;
    if (imgComboIdx >= imgCombos.length) { imgDone = true; showImgEndMessage(); return; }
    imgLoading = true;
    imgLoader.classList.add('show');
    const combo = imgCombos[imgComboIdx];
    try {
      const res = await fetch('/api/images', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ q: currentQuery, page: combo.page, gl: combo.gl, hl: combo.hl, num: 100 })
      });
      const data = await res.json();
      let imgs = (data.images || []).filter(i => i.imageUrl);
      // drop anything we've already shown (regions/pages can overlap)
      imgs = imgs.filter(i => !imgSeenUrls.has(i.imageUrl));
      if (imgFirstLoad) { imgGrid.innerHTML = ''; imgFirstLoad = false; }
      imgComboIdx++;
      if (imgs.length) {
        const remaining = MAX_IMAGES - imgTotalLoaded;
        const batch = imgs.slice(0, remaining);
        batch.forEach(i => imgSeenUrls.add(i.imageUrl));
        appendImages(batch);
        imgTotalLoaded += batch.length;
        if (imgTotalLoaded >= MAX_IMAGES) { imgDone = true; showImgEndMessage(); }
      }
      if (imgComboIdx >= imgCombos.length && !imgDone) { imgDone = true; showImgEndMessage(); }
      checkFillViewport();
    } catch (e) {
      if (imgFirstLoad) { imgGrid.innerHTML = ''; imgFirstLoad = false; }
      imgComboIdx++;
      if (imgComboIdx >= imgCombos.length) { imgDone = true; showImgEndMessage(); }
    } finally {
      imgLoading = false;
      imgLoader.classList.remove('show');
      imagesLoadedForQuery = currentQuery;
    }
  }

  function showImgEndMessage() {
    if (document.getElementById('imgEndMsg')) return;
    const msg = document.createElement('div');
    msg.id = 'imgEndMsg';
    msg.className = 'img-end-msg';
    msg.textContent = imgTotalLoaded > 0 ? `That's all the images we found (${imgTotalLoaded})` : 'No images found';
    imagesContainer.appendChild(msg);
  }

  const imgObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => { if (entry.isIntersecting) loadMoreImages(); });
  }, { rootMargin: '1400px 0px' });
  imgObserver.observe(document.getElementById('imgSentinel'));

  (function initFromQuery() {
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q');
    const p = parseInt(params.get('page'), 10) || 1;
    if (q) {
      inp.value = q;
      document.title = q + ' — Atkyn Search';
      if (xBtn) xBtn.classList.add('show');
      runSearch(q, p);
    } else {
      resultsContainer.innerHTML = '';
    }
  })();

  // ── Search proxy — goes through /api/search (Cloudflare Pages Function).
  // Key stays server-side in the SERPER_API_KEY environment variable, never in this file. ──
  async function searxSearch(q, page) {
    const res = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ q, page, num: 10 })
    });
    if (!res.ok) throw new Error('search failed');
    const data = await res.json();
    const hits = data.organic || [];
    const results = hits.slice(0, PAGE_SIZE).map(h => ({
      title: h.title || h.link,
      snippet: h.snippet || '',
      url: h.link,
      thumb: (h.imageUrl) || (data.images && data.images[0] && data.images[0].imageUrl) || null
    }));
    return { results, totalhits: results.length ? 1000000 : 0, knowledgeGraph: data.knowledgeGraph || null, relatedSearches: data.relatedSearches || [] };
  }

  // ── Wikipedia extract — used to fatten the knowledge-panel summary ──
  async function getWikiExtract(title) {
    try {
      const url = `https://en.wikipedia.org/w/api.php?action=query&prop=extracts&exintro=1&explaintext=1&exchars=380&redirects=1&titles=${encodeURIComponent(title)}&format=json&origin=*`;
      const res = await fetch(url);
      const data = await res.json();
      const pages = (data.query && data.query.pages) || {};
      const page = Object.values(pages)[0];
      return page && page.extract ? page.extract : null;
    } catch (e) { return null; }
  }

  // ── Better-quality image for the knowledge panel via /api/images (Serper image search proxy) ──
  async function getBetterImage(title) {
    try {
      const res = await fetch('/api/images', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ q: title, page: 1 })
      });
      if (!res.ok) return null;
      const data = await res.json();
      const imgs = data.images || [];
      return imgs.length ? (imgs[0].imageUrl || null) : null;
    } catch (e) { return null; }
  }

  let lastKnowledgeGraph = null;
  let lastRelatedSearches = [];

  async function runSearch(q, page) {
    currentQuery = q;
    currentPage = page || 1;
    imagesLoadedForQuery = null;
    renderSkeleton();
    resultStats.textContent = '';
    pagerEl.innerHTML = '';
    kgContainer.innerHTML = '';
    try {
      const { results, totalhits, knowledgeGraph, relatedSearches } = await searxSearch(q, currentPage);
      lastKnowledgeGraph = knowledgeGraph;
      lastRelatedSearches = relatedSearches;
      if (knowledgeGraph) await renderKnowledgePanel(knowledgeGraph);
      if (!results.length) { renderNoResults(q); return; }
      renderStats(totalhits);
      renderCards(results);
      renderPager(currentPage, totalhits);
    } catch (err) {
      renderNoResults(q, true);
    }
  }

  async function renderKnowledgePanel(kg) {
    if (!kg || !kg.title) { kgContainer.innerHTML = ''; return; }

    let domain = '', sourceUrl = kg.descriptionLink || kg.website || '';
    try { domain = sourceUrl ? new URL(sourceUrl).hostname.replace(/^www\./, '') : ''; } catch (e) {}

    let desc = kg.description || '';
    let imageUrl = kg.imageUrl || null;
    const [wikiExtract, betterImage] = await Promise.all([
      getWikiExtract(kg.title),
      getBetterImage(kg.title)
    ]);
    if (wikiExtract && wikiExtract.length > desc.length) desc = wikiExtract;
    if (betterImage) imageUrl = betterImage;

    const imageHtml = imageUrl
      ? `<img class="kg-image" src="${imageUrl}" alt="" referrerpolicy="no-referrer">`
      : '';

    let attrsHtml = '';
    if (kg.attributes) {
      attrsHtml = Object.entries(kg.attributes).map(([label, value]) =>
        `<div class="kg-attr-row"><span class="kg-attr-label">${label}:</span><span class="kg-attr-value">${value}</span></div>`
      ).join('');
    }

    kgContainer.innerHTML = `
      <div class="kg-card">
        <div class="kg-top">
          <div>
            <div class="kg-title">${kg.title}</div>
            ${kg.type ? `<div class="kg-type">${kg.type}</div>` : ''}
          </div>
          <div class="kg-image-box">${imageHtml}</div>
        </div>
        ${desc ? `<div class="kg-desc">${desc}</div>` : ''}
        ${domain ? `
        <a class="kg-source" href="${sourceUrl}" target="_blank" rel="noopener">
          <span class="kg-source-fav" style="background-image:url('https://www.google.com/s2/favicons?domain=${domain}&sz=64')"></span>
          <span class="kg-source-text">${domain}</span>
        </a>` : ''}
        ${attrsHtml ? `<div class="kg-attrs">${attrsHtml}</div>` : ''}
      </div>`;
  }

  function renderSkeleton() {
    let html = '';
    for (let i = 0; i < 4; i++) {
      html += `
      <div class="skel-card">
        <div class="skel-row">
          <div class="skel-dot"></div>
          <div class="skel-line skel-host"></div>
        </div>
        <div class="skel-line skel-title"></div>
        <div class="skel-line skel-snip"></div>
        <div class="skel-line skel-snip short"></div>
      </div>`;
    }
    resultsContainer.innerHTML = html;
  }

  function renderStats(totalhits) {
    if (!totalhits) { resultStats.textContent = ''; return; }
    resultStats.textContent = `About ${totalhits.toLocaleString('en-US')} results`;
  }

  function renderCards(results) {
    resultsContainer.innerHTML = results.map(r => {
      let domain = '', pathBreadcrumb = '', displayName = '';
      try {
        const u = new URL(r.url);
        domain = u.hostname.replace(/^www\./, '');
        displayName = domain.split('.')[0];
        displayName = displayName.charAt(0).toUpperCase() + displayName.slice(1);
        const segs = u.pathname.split('/').filter(Boolean);
        pathBreadcrumb = segs.length ? `${domain} › ${segs.join(' › ')}` : domain;
      } catch (e) {
        domain = r.url || '';
        displayName = domain;
        pathBreadcrumb = domain;
      }
      const thumbHtml = r.thumb
        ? `<img class="r-thumb" src="${r.thumb}" alt="" loading="lazy" referrerpolicy="no-referrer">`
        : '';
      return `
      <div class="card">
        <div class="card-body">
          <div class="card-content">
            <div class="r-host">
              <div class="r-fav" style="background-image:url('https://www.google.com/s2/favicons?domain=${domain}&sz=64')"></div>
              <div class="r-host-text">
                <span class="r-domain">${displayName}</span>
                <span class="r-path">${pathBreadcrumb}</span>
              </div>
              <button class="r-dots">
                <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
              </button>
            </div>
            <a href="${r.url}" target="_blank" rel="noopener" class="r-title">${r.title}</a>
            <a href="${r.url}" target="_blank" rel="noopener" class="r-snip">${r.snippet || 'No preview available.'}</a>
          </div>
          ${thumbHtml}
        </div>
      </div>`;
    }).join('');
  }

  function renderNoResults(q, isError) {
    resultsContainer.innerHTML = `
    <div class="no-results">
      <div class="no-results__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" width="40" height="40"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <div class="no-results__title">${isError ? "Couldn't reach search" : `No results for "${q}"`}</div>
      <div class="no-results__sub">${isError ? 'Check your connection and try again.' : 'Try different or more general keywords.'}</div>
    </div>`;
    resultStats.textContent = '';
  }

  function renderPager(page, totalhits) {
    const totalPages = Math.max(1, Math.ceil(totalhits / PAGE_SIZE));
    const maxPage = Math.min(totalPages, 20);
    const windowStart = Math.max(1, Math.min(page - 2, maxPage - 4));
    const windowEnd = Math.min(maxPage, windowStart + 4);
    let html = '';
    html += `<button class="pg" ${page <= 1 ? 'disabled' : ''} data-page="${page - 1}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="15 18 9 12 15 6"/></svg>
    </button>`;
    for (let i = windowStart; i <= windowEnd; i++) {
      html += `<button class="pg ${i === page ? 'on' : ''}" data-page="${i}">${i}</button>`;
    }
    html += `<button class="pg" ${page >= maxPage ? 'disabled' : ''} data-page="${page + 1}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="9 18 15 12 9 6"/></svg>
    </button>`;
    pagerEl.innerHTML = html;
    pagerEl.querySelectorAll('.pg:not([disabled])').forEach(btn => {
      btn.addEventListener('click', () => {
        const p = parseInt(btn.dataset.page, 10);
        if (!p || p === page) return;
        const params = new URLSearchParams(window.location.search);
        params.set('q', currentQuery);
        params.set('page', p);
        window.history.pushState({}, '', 'search.html?' + params.toString());
        runSearch(currentQuery, p);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  inp.addEventListener('input', function () {
    const q = this.value.trim();
    xBtn.classList.toggle('show', q.length > 0);
    clearTimeout(tmr);
    if (!q) { hide(); return; }
    tmr = setTimeout(async () => render(await fetchSug(q)), 180);
  });

  xBtn.addEventListener('click', () => { inp.value = ''; xBtn.classList.remove('show'); hide(); inp.focus(); });

  inp.addEventListener('keydown', e => {
    const rows = sugBox.querySelectorAll('.sug-row');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      active = Math.min(active + 1, rows.length - 1);
      hi(rows);
      if (rows[active]) inp.value = rows[active].dataset.v;
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      active = Math.max(active - 1, -1);
      hi(rows);
    } else if (e.key === 'Enter') {
      hide();
      const q = inp.value.trim();
      if (q) window.location.href = 'search.html?q=' + encodeURIComponent(q);
    } else if (e.key === 'Escape') {
      hide();
    }
  });

  document.addEventListener('click', e => { if (!e.target.closest('.pill-wrap')) hide(); });

  function hi(r) { r.forEach((x, i) => x.classList.toggle('hl', i === active)); }
  function hide() { sugBox.classList.remove('show'); active = -1; }
  function show() { sugBox.classList.add('show'); }

  function fetchSug(q) {
    return new Promise(res => {
      const cb = '_s' + Date.now(), s = document.createElement('script');
      s.src = `https://suggestqueries.google.com/complete/search?client=firefox&q=${encodeURIComponent(q)}&callback=${cb}`;
      window[cb] = d => { res(d[1] || []); delete window[cb]; s.remove(); };
      s.onerror = () => { res([]); s.remove(); };
      document.head.appendChild(s);
    });
  }

  function render(items) {
    if (!items.length) { hide(); return; }
    sugBox.innerHTML = items.slice(0, 6).map(s =>
      `<button class="sug-row" data-v="${s.replace(/"/g, '&quot;')}" onmousedown="pick(this)">
        <span class="sug-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>${s}
      </button>`
    ).join('');
    show(); active = -1;
  }

  function pick(el) { inp.value = el.dataset.v; hide(); }
</script>
</body>
</html>
