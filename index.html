<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atkyn — fast Internet search</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 22px;
      padding-bottom: 18vh;
    }

    .logo {
      font-family: 'Pacifico', cursive;
      font-size: 3.2rem;
      color: #0072B1;
      margin-bottom: 48px;
      letter-spacing: 0.01em;
    }

    .search-wrap {
      width: 100%;
      max-width: 580px;
      position: relative;
    }

    .search-pill {
      width: 100%;
      display: flex;
      align-items: center;
      border: 1.5px solid #0072B1;
      border-radius: 100px;
      padding: 0 16px 0 18px;
      height: 58px;
      background: #fff;
      gap: 10px;
      position: relative;
      z-index: 10;
      transition: box-shadow 0.15s ease;
    }
    @media (hover: hover) {
      .search-pill:hover { box-shadow: 0 1px 6px rgba(32,33,36,0.28); }
    }
    .search-input, .ico-camera { cursor: text; }
    .ico-camera { cursor: pointer; }

    @media (min-width: 900px) {
      body { padding-bottom: 22vh; }
      .logo { font-size: 3.6rem; }
    }

    .ico-search { flex-shrink: 0; color: #0072B1; display: flex; align-items: center; }
    .ico-search svg { width: 22px; height: 22px; }

    .input-wrap {
      flex: 1;
      position: relative;
      height: 100%;
      display: flex;
      align-items: center;
    }

    .search-input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-size: 1.05rem;
      font-family: inherit;
      color: #1a1a1a;
      padding: 0;
      z-index: 2;
      caret-color: #0072B1;
    }
    .search-input::placeholder { color: transparent; }

    .shimmer-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    .shimmer-text span {
      font-size: 1.05rem;
      white-space: nowrap;
      background: linear-gradient(90deg,
        #b0bec5 0%, #b0bec5 25%,
        #0072B1 48%, #0072B1 52%,
        #b0bec5 75%, #b0bec5 100%);
      background-size: 300% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: sweep 3.5s 1s linear infinite;
    }
    @keyframes sweep {
      0%   { background-position: 150% center; }
      100% { background-position: -150% center; }
    }
    .search-input:not(:placeholder-shown) + .shimmer-text { display: none; }

    .ico-camera {
      flex-shrink: 0;
      border: none;
      background: none;
      cursor: pointer;
      color: #0072B1;
      display: flex;
      align-items: center;
      padding: 0;
    }
    .ico-camera svg { width: 22px; height: 22px; }

    .suggestions {
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      right: 0;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      z-index: 9;
      box-shadow:
        0 2px 8px rgba(0,0,0,0.08),
        0 8px 32px rgba(0,0,0,0.12);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-4px);
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    .suggestions.show {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }

    .suggestion-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 18px;
      cursor: pointer;
      font-size: 0.97rem;
      color: #1a1a1a;
      transition: background 0.1s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }
    .suggestion-item:hover,
    .suggestion-item.active { background: #f5f8fa; }
    .suggestion-item + .suggestion-item { border-top: 1px solid #f0f2f4; }

    .sug-icon { color: #aab4bc; flex-shrink: 0; }
    .sug-icon svg { width: 15px; height: 15px; }
  </style>
</head>
<body>

  <div class="logo">Atkyn</div>

  <div class="search-wrap" id="searchWrap">
    <div class="search-pill">
      <span class="ico-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7.5"/><line x1="21" y1="21" x2="16.8" y2="16.8"/>
        </svg>
      </span>

      <div class="input-wrap">
        <input class="search-input" type="text" id="q" placeholder=" " autocomplete="off" />
        <div class="shimmer-text"><span>Search with Atkyn AI</span></div>
      </div>

      <button class="ico-camera" aria-label="Visual search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </button>
    </div>

    <div class="suggestions" id="suggestions"></div>
  </div>

  <script>
    const input = document.getElementById('q');
    const box   = document.getElementById('suggestions');
    let active  = -1;
    let timer;

    function showSug() { box.classList.add('show'); }
    function hideSug() { box.classList.remove('show'); active = -1; }

    function fetchSuggestions(q) {
      return new Promise((resolve) => {
        const cb = 'sg_' + Date.now();
        const s  = document.createElement('script');
        s.src = `https://suggestqueries.google.com/complete/search?client=firefox&q=${encodeURIComponent(q)}&callback=${cb}`;
        window[cb] = (data) => { resolve(data[1] || []); delete window[cb]; s.remove(); };
        s.onerror = () => { resolve([]); s.remove(); };
        document.head.appendChild(s);
      });
    }

    function render(items) {
      if (!items.length) { hideSug(); return; }
      box.innerHTML = items.slice(0, 6).map(s => `
        <button class="suggestion-item" data-val="${s.replace(/"/g,'&quot;')}" onmousedown="pick(this)">
          <span class="sug-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
              <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </span>
          ${s}
        </button>`).join('');
      showSug();
      active = -1;
    }

    function pick(el) {
      input.value = el.dataset.val;
      hideSug();
      doSearch();
    }

    input.addEventListener('input', function () {
      const q = this.value.trim();
      clearTimeout(timer);
      if (!q) { hideSug(); return; }
      timer = setTimeout(async () => {
        const items = await fetchSuggestions(q);
        render(items);
      }, 200);
    });

    input.addEventListener('keydown', function (e) {
      const items = box.querySelectorAll('.suggestion-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        active = Math.min(active + 1, items.length - 1);
        items.forEach((el, i) => el.classList.toggle('active', i === active));
        if (items[active]) input.value = items[active].dataset.val;
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        active = Math.max(active - 1, -1);
        items.forEach((el, i) => el.classList.toggle('active', i === active));
      } else if (e.key === 'Enter') {
        hideSug(); doSearch();
      } else if (e.key === 'Escape') {
        hideSug();
      }
    });

    document.addEventListener('click', function (e) {
      if (!e.target.closest('#searchWrap')) hideSug();
    });

    function doSearch() {
      const q = input.value.trim();
      if (q) window.location.href = 'search.html?q=' + encodeURIComponent(q);
    }
  </script>

</body>
</html>
