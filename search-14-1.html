<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>hey — Atkyn Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html {
      scroll-behavior: smooth;
    }
    html, body {
      font-family: Arial, Helvetica, sans-serif;
      background: #F4F4F4;
      color: #000;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior-y: contain;
      -webkit-overflow-scrolling: touch;
    }
    img, svg { will-change: auto; }
    .r-card, .nav-tab, .r-title, .r-snip, .r-dots, .pg, .hamburger {
      -webkit-tap-highlight-color: transparent;
    }
    .header {
      position: relative;
      background: #fff;
    }
    .h-row1 {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      height: 64px;
      padding: 0 14px 0 0;
    }
    .hamburger {
      border: none; background: none;
      cursor: pointer;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.5px;
      padding: 12px;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      isolation: isolate;
    }
    .hamburger::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      border-radius: 50%;
      background: rgba(0,0,0,0.08);
      transform: translate(-50%, -50%);
      transition: width 0.32s ease, height 0.32s ease;
      z-index: -1;
    }
    .hamburger:active::before {
      width: 130%;
      height: 130%;
      transition: width 0.05s ease, height 0.05s ease;
    }
    .hamburger span {
      display: block;
      width: 10px; height: 10px;
      background: linear-gradient(145deg, #5a5a5a, #2e2e2e);
      border-radius: 3px;
    }
    .h-row2 {
      padding: 0 12px 10px 12px;
    }
    .pill-wrap {
      position: relative;
      width: 100%;
    }
    .pill {
      display: flex;
      align-items: center;
      height: 50px;
      border: 1.8px solid #0072B1;
      border-radius: 9999px;
      padding: 0 14px 0 4px;
      background: #fff;
      gap: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .pill-logo {
      flex-shrink: 0;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      user-select: none;
      position: relative;
    }
    .pill-logo svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .pill input {
      flex: 1; min-width: 0;
      border: none; outline: none;
      background: transparent;
      font-size: 1.125rem;
      font-family: Arial, Helvetica, sans-serif;
      color: #000;
      caret-color: #0072B1;
    }
    .pill input[type=search]::-webkit-search-cancel-button { display: none; }
    .pill input[type=search]::-webkit-search-decoration { display: none; }
    .pill-x {
      display: none;
      border: none; background: none;
      cursor: pointer;
      color: #9e9e9e;
      line-height: 0;
      padding: 8px;
      flex-shrink: 0;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      isolation: isolate;
    }
    .pill-x::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      border-radius: 50%;
      background: rgba(0,0,0,0.08);
      transform: translate(-50%, -50%);
      transition: width 0.32s ease, height 0.32s ease;
      z-index: -1;
    }
    .pill-x:active::before {
      width: 160%;
      height: 160%;
      transition: width 0.05s ease, height 0.05s ease;
    }
    .pill-x.show { display: flex; }
    .pill-x svg { width: 26px; height: 26px; }
    .h-nav {
      display: flex;
      align-items: center;
      height: auto;
      padding: 2px 14px 2px 14px;
      gap: 2px;
      overflow-x: auto;
      scrollbar-width: none;
      background: #fff;
    }
    .h-nav::-webkit-scrollbar { display: none; }
    .nav-tab {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 12px 8px;
      font-size: 1.05rem;
      font-weight: 500;
      white-space: nowrap;
      text-decoration: none;
      cursor: pointer;
      border-radius: 6px;
      border: none;
      background: #fff;
      color: #333;
      letter-spacing: 0;
      line-height: 1;
      text-transform: capitalize;
      -webkit-font-smoothing: antialiased;
      box-shadow: none;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s ease, background 0.1s ease, color 0.1s ease;
      user-select: none;
    }
    .nav-tab:active {
      transform: scale(0.93);
      background: #e8e8e8;
    }
    .nav-tab.on {
      background: #fff;
      color: #111;
      font-weight: 700;
    }
    .nav-tab.on:active {
      transform: scale(0.93);
      background: #e8e8e8;
    }
    body { padding-top: 0; }
    .page { padding-bottom: 16px; -webkit-overflow-scrolling: touch; contain: layout style paint; transform: translateZ(0); }
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 12px 14px 14px 14px;
      margin: 6px 8px 0 8px;
      position: relative;
      overflow: visible;
      content-visibility: auto;
      contain-intrinsic-size: 0 120px;
      box-shadow: none;
    }
    .card-body {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .card-content { flex: 1; min-width: 0; }
    .r-thumb {
      flex-shrink: 0;
      width: 84px;
      height: 84px;
      border-radius: 10px;
      object-fit: contain;
      background: #f1f3f4;
      display: block;
    }
    @media (min-width: 900px) {
      .r-thumb { width: 110px; height: 110px; }
    }
    .r-host {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .r-fav {
      width: 30px; height: 30px;
      min-width: 30px; min-height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #f1f3f4 center/20px 20px no-repeat;
      display: block;
    }
    .r-host-text {
      flex: 1; min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .r-domain {
      font-size: 0.875rem;
      font-weight: 400;
      color: #222;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .r-path {
      font-size: 0.775rem;
      color: #888;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .r-dots {
      flex-shrink: 0;
      border: none; background: none;
      cursor: pointer;
      color: #aaa;
      line-height: 0;
      padding: 6px;
      align-self: flex-start;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      isolation: isolate;
      margin: -6px -6px 0 0;
    }
    .r-dots::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      border-radius: 50%;
      background: rgba(0,0,0,0.08);
      transform: translate(-50%, -50%);
      transition: width 0.32s ease, height 0.32s ease;
      z-index: -1;
    }
    .r-dots:active::before {
      width: 160%;
      height: 160%;
      transition: width 0.05s ease, height 0.05s ease;
    }
    .r-dots svg { width: 20px; height: 20px; }
    .r-title {
      display: block;
      font-size: 1.22rem;
      font-weight: 700;
      color: #08519C;
      text-decoration: none;
      line-height: 1.32;
      margin: 5px 0 5px;
      -webkit-tap-highlight-color: transparent;
    }
    .r-title:hover { text-decoration: underline; }
    .r-snip {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-size: 0.95rem;
      color: #4a4f5a;
      line-height: 1.55;
      text-decoration: none;
      cursor: pointer;
      margin: 0 -8px;
      padding: 2px 8px;
      border-radius: 8px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s ease;
    }
    .r-snip:active {
      background: rgba(0,0,0,0.08);
      transition: background 0.05s ease;
    }
    .r-snip b, .r-snip .searchmatch { font-weight: 700; color: #202A44; font-style: normal; }
    /* Big preview variant (alternates with compact thumb) — Yandex video-card style */
    .r-preview {
      display: block;
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      background: #eef0f2;
      margin: 4px 0 8px;
      box-shadow: none;
    }
    .r-preview img {
      width: 100%;
      height: 190px;
      object-fit: cover;
      display: block;
      background: #eef0f2;
    }
    .r-preview__play {
      position: absolute;
      left: 12px; bottom: 12px;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(0,0,0,0.55);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      padding-left: 3px;
    }
    @media (min-width: 900px) { .r-preview img { height: 260px; } }
    /* Knowledge Panel — Yandex style */
    .kp {
      background: #fff;
      border-radius: 14px;
      padding: 0 0 14px 0;
      margin: 6px 8px 0 8px;
      overflow: hidden;
    }
    /* Hero image — full width at top, like Yandex */
    .kp-hero {
      width: 100%;
      display: flex;
      gap: 2px;
      background: #f1f3f4;
      border-radius: 14px 14px 0 0;
      overflow: hidden;
      max-height: 180px;
    }
    .kp-hero img {
      flex: 1;
      width: 50%;
      height: 180px;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
    .kp-hero img:only-child {
      width: 100%;
      flex: none;
    }
    /* Single image fallback: small square beside title */
    .kp-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 14px 0 14px;
    }
    .kp-img-small {
      width: 72px;
      height: 72px;
      border-radius: 10px;
      object-fit: cover;
      object-position: center top;
      flex-shrink: 0;
      background: #f1f3f4;
    }
    .kp-body {
      padding: 12px 14px 0 14px;
    }
    .kp-title {
      font-size: 1.3rem;
      font-weight: 800;
      color: #111;
      line-height: 1.2;
      margin-bottom: 2px;
    }
    .kp-type {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 0;
    }
    .kp-desc {
      font-size: 0.93rem;
      color: #333;
      line-height: 1.6;
      margin-bottom: 10px;
      margin-top: 10px;
    }
    .kp-source {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: #555;
      background: #f1f3f4;
      border-radius: 20px;
      padding: 5px 12px;
      text-decoration: none;
      margin-bottom: 12px;
    }
    .kp-source svg {
      flex-shrink: 0;
    }
    .kp-facts {
      border-top: 1px solid #f0f0f0;
      padding-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .kp-fact {
      font-size: 0.88rem;
      color: #333;
      line-height: 1.45;
    }
    .kp-fact b { color: #111; font-weight: 600; }
    .kp-fact a { color: #0072B1; text-decoration: none; }
    /* See also strip */
    .kp-seealso {
      margin-top: 14px;
      border-top: 1px solid #f0f0f0;
      padding-top: 12px;
    }
    .kp-seealso-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .kp-seealso-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .kp-seealso-row::-webkit-scrollbar { display: none; }
    .kp-seealso-chip {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      width: 80px;
      text-decoration: none;
    }
    .kp-seealso-chip img {
      width: 80px;
      height: 56px;
      border-radius: 8px;
      object-fit: cover;
      background: #f1f3f4;
      border: 1px solid #ebebeb;
    }
    .kp-seealso-chip span {
      font-size: 0.75rem;
      color: #333;
      text-align: center;
      line-height: 1.3;
    }
    @media (min-width: 900px) {
      .kp { max-width: 640px; margin: 20px 0 0; border-radius: 10px; overflow: hidden; }
      .kp-hero { max-height: 220px; border-radius: 10px 10px 0 0; }
      .kp-hero img { height: 220px; }
    }
    /* Knowledge Panel — Yandex style end */
    .result-stats {
      font-size: 0.82rem;
      color: #70757a;
      padding: 10px 16px 2px;
    }
    @media (min-width: 900px) { .result-stats { padding: 14px 0 0; max-width: 640px; } }
    .skel-card {
      background: #fff;
      border-radius: 14px;
      padding: 12px 14px 14px 14px;
      margin: 6px 8px 0 8px;
    }
    @media (min-width: 900px) { .skel-card { max-width: 640px; margin: 20px 0 0 0; padding: 16px 20px 18px; border-radius: 10px; } }
    .skel-line {
      height: 12px;
      border-radius: 6px;
      background: linear-gradient(90deg, #eceff1 25%, #f6f7f8 37%, #eceff1 63%);
      background-size: 400% 100%;
      animation: skel-sweep 1.4s ease infinite;
      margin-bottom: 8px;
    }
    @keyframes skel-sweep {
      0% { background-position: 100% 50%; }
      100% { background-position: 0 50%; }
    }
    .skel-title { width: 55%; height: 16px; }
    .skel-host { width: 35%; height: 11px; margin-bottom: 10px; }
    .skel-snip { width: 100%; }
    .skel-snip.short { width: 70%; margin-bottom: 0; }
    /* ══════════════════════════
    IMAGES GRID (masonry via CSS columns) — Google Images style, white bg
    ══════════════════════════ */
    body.images-mode { background: #fff; }
    body.images-mode .page { padding-bottom: 0; }
    .img-grid {
      column-count: 2;
      column-gap: 4px;
      padding: 6px;
      background: #fff;
    }
    @media (min-width: 600px) { .img-grid { column-count: 4; column-gap: 6px; } }
    @media (min-width: 900px) { .img-grid { column-count: 5; max-width: 1100px; margin: 0 auto; padding: 12px 16px; column-gap: 8px; } }
    .img-tile {
      break-inside: avoid;
      margin-bottom: 4px;
      border-radius: 8px;
      overflow: hidden;
      background: #f8f9fa;
      display: block;
      position: relative;
      cursor: pointer;
    }
    @media (min-width: 900px) { .img-tile { margin-bottom: 8px; border-radius: 10px; } }
    .img-tile img {
      width: 100%;
      height: auto;
      display: block;
      background: #f8f9fa;
    }
    .img-tile img.loaded { opacity: 1; }
    .img-tile__label {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      padding: 16px 8px 6px;
      background: linear-gradient(to top, rgba(0,0,0,0.55), transparent);
      color: #fff;
      font-size: 0.72rem;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0;
      transition: opacity 0.15s ease;
      pointer-events: none;
    }
    .img-tile:active .img-tile__label { opacity: 1; }
    .img-skel {
      break-inside: avoid;
      margin-bottom: 4px;
      border-radius: 8px;
      background: linear-gradient(90deg, #f4f5f6 25%, #fafbfb 37%, #f4f5f6 63%);
      background-size: 400% 100%;
      animation: skel-sweep 1.4s ease infinite;
    }
    @media (min-width: 900px) { .img-skel { margin-bottom: 8px; border-radius: 10px; } }
    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0,0,0,0.92);
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .lightbox.open { display: flex; }
    .lightbox__img {
      max-width: 95vw;
      max-height: 82vh;
      object-fit: contain;
      border-radius: 6px;
      display: block;
    }
    .lightbox__close {
      position: absolute;
      top: 16px; right: 16px;
      background: rgba(255,255,255,0.15);
      border: none; color: #fff;
      width: 40px; height: 40px;
      border-radius: 50%;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .lightbox__source {
      margin-top: 12px;
      color: rgba(255,255,255,0.6);
      font-size: 0.8rem;
      text-align: center;
      padding: 0 20px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 90vw;
      text-decoration: none;
    }
    .img-grid-sentinel {
      height: 1px;
      grid-column: 1 / -1;
    }
    .img-loading-more {
      column-span: all;
      text-align: center;
      padding: 20px 0;
      color: #9aa0a6;
      font-size: 0.85rem;
    }
    .no-results {
      text-align: center;
      padding: 60px 24px;
      color: #5f6368;
    }
    .no-results__icon { color: #c2c6cf; margin-bottom: 12px; }
    .no-results__title { font-size: 1.15rem; font-weight: 700; color: #202124; margin-bottom: 6px; }
    .no-results__sub { font-size: 0.92rem; color: #70757a; }
    .end-foot {
      text-align: left;
      padding: 14px 24px 16px;
    }
    .end-foot__eyebrow {
      font-size: 1.15rem;
      font-weight: 700;
      color: #8a8f99;
      margin-bottom: 6px;
    }
    .end-foot__title {
      font-size: 1.85rem;
      font-weight: 800;
      color: #c2c6cf;
      line-height: 1.2;
      margin-bottom: 16px;
    }
    .end-foot__btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 28px;
      border: none;
      border-radius: 10px;
      background: #0072B1;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.1px;
      text-decoration: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 2px 0 rgba(0,80,124,0.4);
      transition: background 0.15s ease, transform 0.08s ease, box-shadow 0.15s ease;
    }
    .end-foot__btn:active {
      background: #00628f;
      transform: scale(0.96);
      box-shadow: 0 1px 0 rgba(0,80,124,0.4);
    }
    .end-brand {
      margin: 0;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px));
      text-align: center;
    }
    .end-brand__logo {
      font-size: 1.1rem;
      font-weight: 800;
      color: #111;
      letter-spacing: 0.3px;
      margin-bottom: 3px;
    }
    .end-brand__by {
      font-size: 0.78rem;
      color: #9aa0ab;
      margin-bottom: 6px;
    }
    .end-brand__copy {
      font-size: 0.75rem;
      color: #aeb3bd;
    }
    .pager {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 20px 8px 14px;
    }
    .pg {
      min-width: 38px; height: 38px;
      border: none; background: none;
      cursor: pointer; border-radius: 50%;
      font-size: 0.9rem;
      color: #555;
      display: flex; align-items: center; justify-content: center;
      font-family: Arial, sans-serif;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      isolation: isolate;
    }
    .pg::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      border-radius: 50%;
      background: rgba(0,0,0,0.08);
      transform: translate(-50%, -50%);
      transition: width 0.32s ease, height 0.32s ease;
      z-index: -1;
    }
    .pg:active::before { width: 160%; height: 160%; transition: width 0.05s ease, height 0.05s ease; }
    .pg.on::before { background: rgba(255,255,255,0.25); }
    .pg.on { background: #0072B1; color: #fff; font-weight: 700; }
    .pg:hover:not(.on):not([disabled]) { background: #f0f0f0; }
    .pg[disabled] { opacity: .3; cursor: default; }
    .pg-dot { color: #888; font-size: 0.9rem; padding: 0 3px; }
    .sug {
      position: absolute;
      top: calc(100% + 3px);
      left: 0; right: 0;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,.18);
      overflow: hidden;
      z-index: 200;
      opacity: 0; pointer-events: none;
      transform: translateY(-4px);
      transition: opacity .12s, transform .12s;
    }
    .sug.show { opacity: 1; pointer-events: all; transform: none; }
    .sug-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 0.9375rem;
      border: none; background: none;
      width: 100%; text-align: left;
      font-family: Arial, sans-serif; color: #000;
    }
    .sug-row + .sug-row { border-top: 1px solid #f0f2f4; }
    .sug-row:hover, .sug-row.hl { background: #f8f9fa; }
    .sug-ico { color: #bdc1c6; line-height: 0; flex-shrink: 0; }
    .sug-ico svg { width: 16px; height: 16px; }
    .hamburger-desktop-slot { display: none; }
    @media (min-width: 900px) {
      body { background: #fff; }
      .h-row1 { display: none; }
      .header { border-bottom: 1px solid #e6e6e6; }
      .header-inner {
        max-width: 900px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        gap: 24px;
        padding: 14px 24px;
      }
      .h-row2 { padding: 0; flex-shrink: 0; width: 480px; }
      .pill { height: 46px; border-width: 1.5px; }
      .pill-logo { width: 34px; height: 34px; }
      .pill input { font-size: 1rem; }
      .pill-x svg { width: 20px; height: 20px; }
      .h-nav { padding: 0; gap: 4px; flex: 1; overflow: visible; }
      .nav-tab { font-size: 0.9rem; padding: 8px 12px; border-radius: 8px; }
      .nav-tab:hover { background: #f0f0f0; }
      .nav-tab.on { background: #e8f2fa; color: #0072B1; }
      .nav-tab.on:hover { background: #dcecf7; }
      .hamburger-desktop-slot { display: flex; flex-shrink: 0; }
      .page { max-width: 900px; margin: 0 auto; padding: 0 24px 32px; }
      .card {
        max-width: 640px;
        margin: 20px 0 0 0;
        padding: 16px 20px 18px;
        border-radius: 10px;
        box-shadow: none;
        transition: box-shadow 0.15s ease;
      }
      .card:hover { box-shadow: none; }
      .r-title { font-size: 1.35rem; }
      .r-snip { font-size: 1rem; cursor: default; }
      .r-snip:active, .r-snip:hover { background: transparent; }
      .end-foot, .end-brand { max-width: 640px; }
      .pager { justify-content: flex-start; padding-left: 4px; }
    }
  </style>
</head>
<body>
<div class="lightbox" id="lightbox">
  <button class="lightbox__close" id="lightboxClose">✕</button>
  <img class="lightbox__img" id="lightboxImg" src="" alt="">
  <a class="lightbox__source" id="lightboxSource" target="_blank" rel="noopener"></a>
</div>
<header class="header">
  <div class="h-row1">
    <button class="hamburger" aria-label="Menu">
      <span></span><span></span><span></span><span></span>
    </button>
  </div>
  <div class="header-inner">
    <div class="h-row2">
      <div class="pill-wrap">
        <div class="pill">
          <div class="pill-logo">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <circle cx="50" cy="50" r="49" fill="#ffffff"/>
              <circle cx="46" cy="46" r="22" fill="none" stroke="#0072B1" stroke-width="9"/>
              <line x1="62" y1="62" x2="72" y2="72" stroke="#0072B1" stroke-width="9.5" stroke-linecap="round"/>
            </svg>
          </div>
          <input id="q" type="search" value="hey" autocomplete="off" spellcheck="false">
          <button class="pill-x show" id="xBtn">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
          </button>
        </div>
        <div class="sug" id="sugBox"></div>
      </div>
    </div>
    <nav class="h-nav">
      <a href="#" class="nav-tab on" data-mode="web">web</a>
      <a href="#" class="nav-tab" data-mode="ai">AI</a>
      <a href="#" class="nav-tab" data-mode="images">images</a>
      <a href="#" class="nav-tab" data-mode="video">video</a>
      <a href="#" class="nav-tab" data-mode="maps">maps</a>
      <a href="#" class="nav-tab" data-mode="news">news</a>
    </nav>
    <button class="hamburger hamburger-desktop-slot" aria-label="Menu">
      <span></span><span></span><span></span><span></span>
    </button>
  </div>
</header>
<div class="page">
  <div class="result-stats" id="resultStats"></div>
  <div id="resultsContainer">
  </div>
  <div class="pager" id="pager"></div>
  <div class="end-foot">
    <div class="end-foot__eyebrow">That's all for now!</div>
    <div class="end-foot__title">Didn't find what you're looking for?</div>
    <a href="javascript:void(0)" class="end-foot__btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" width="17" height="17"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
Search Now
    </a>
  </div>
  <div class="end-brand">
    <div class="end-brand__logo">Atkyn</div>
    <div class="end-brand__by">by Canacot Systems</div>
    <div class="end-brand__copy">© 2026 Atkyn. All rights reserved.</div>
  </div>
</div>
<script>
  const inp = document.getElementById('q');
  const xBtn = document.getElementById('xBtn');
  const sugBox = document.getElementById('sugBox');
  const resultsContainer = document.getElementById('resultsContainer');
  const resultStats = document.getElementById('resultStats');
  const pagerEl = document.getElementById('pager');
  let active = -1, tmr;
  const PAGE_SIZE = 10;
  let currentQuery = '';
  let currentPage = 1;
  let currentMode = 'web';

  const tabEls = document.querySelectorAll('.nav-tab');
  tabEls.forEach(tab => {
    tab.addEventListener('click', e => {
      e.preventDefault();
      const mode = tab.dataset.mode;
      if (!mode || mode === currentMode) return;
      if (mode !== 'web' && mode !== 'images') return; // only these are wired up for now
      tabEls.forEach(t => t.classList.toggle('on', t === tab));
      currentMode = mode;
      document.body.classList.toggle('images-mode', mode === 'images');
      const params = new URLSearchParams(window.location.search);
      params.set('mode', mode);
      if (currentQuery) params.set('q', currentQuery);
      params.delete('page');
      window.history.pushState({}, '', 'search.html?' + params.toString());
      if (currentQuery) runSearch(currentQuery, 1);
    });
  });

  (function initFromQuery() {
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q');
    const p = parseInt(params.get('page'), 10) || 1;
    const mode = params.get('mode');
    if (mode === 'images') {
      currentMode = 'images';
      tabEls.forEach(t => t.classList.toggle('on', t.dataset.mode === 'images'));
      document.body.classList.add('images-mode');
    }
    if (q) {
      inp.value = q;
      document.title = q + ' — Atkyn Search';
      if (xBtn) xBtn.classList.add('show');
      runSearch(q, p);
    } else {
      resultsContainer.innerHTML = '';
    }
  })();

  async function wikiSearch(q, offset) {
    const searchUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&srlimit=${PAGE_SIZE}&sroffset=${offset}&srprop=snippet|wordcount&srinfo=totalhits&format=json&origin=*`;
    const res = await fetch(searchUrl);
    if (!res.ok) throw new Error('search failed');
    const data = await res.json();
    const hits = (data.query && data.query.search) || [];
    const totalhits = (data.query && data.query.searchinfo && data.query.searchinfo.totalhits) || 0;
    if (!hits.length) return { results: [], totalhits };

    const titles = hits.map(h => h.title).join('|');
    const infoUrl = `https://en.wikipedia.org/w/api.php?action=query&prop=pageimages|info&inprop=url&piprop=thumbnail&pithumbsize=300&titles=${encodeURIComponent(titles)}&format=json&origin=*`;
    let infoByTitle = {};
    try {
      const infoRes = await fetch(infoUrl);
      const infoData = await infoRes.json();
      const pages = (infoData.query && infoData.query.pages) || {};
      Object.values(pages).forEach(p => { infoByTitle[p.title] = p; });
    } catch (e) { /* thumbnails are a nice-to-have, search still works without */ }

    const results = hits.map(h => {
      const info = infoByTitle[h.title] || {};
      return {
        title: h.title,
        snippet: h.snippet || '',
        url: info.fullurl || ('https://en.wikipedia.org/wiki/' + encodeURIComponent(h.title.replace(/ /g, '_'))),
        thumb: info.thumbnail ? info.thumbnail.source : null
      };
    });
    return { results, totalhits };
  }

  // ── Serper (Google Search API) — proxied through Cloudflare Pages Function ──
  // Key lives server-side in functions/api/search.js — never exposed to the browser.
  async function searxSearch(q, page) {
    const res = await fetch('/api/search', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ q, page })
    });
    if (!res.ok) throw new Error('search failed');
    const data = await res.json();
    const hits = data.organic || [];
    const results = hits.slice(0, PAGE_SIZE).map(h => ({
      title: h.title || h.link,
      snippet: h.snippet || '',
      url: h.link,
      thumb: h.thumbnailUrl || h.imageUrl || null
    }));
    const kp = data.knowledgeGraph || null;
    return { results, totalhits: results.length ? 1000000 : 0, kp };
  }

  // Lightbox
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const lightboxSource = document.getElementById('lightboxSource');
  const lightboxClose = document.getElementById('lightboxClose');
  function openLightbox(thumb, source) {
    lightboxImg.src = thumb;
    lightboxSource.href = source;
    lightboxSource.textContent = source.replace(/^https?:\/\//, '').split('/')[0];
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    lightbox.classList.remove('open');
    lightboxImg.src = '';
    document.body.style.overflow = '';
  }
  lightboxClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
  const MAX_IMAGES = 300;
  let imgState = { query: '', page: 1, loading: false, done: false, seen: new Set(), total: 0 };
  let imgObserver = null;

  function imgObserverTeardown() {
    if (imgObserver) { imgObserver.disconnect(); imgObserver = null; }
  }

  async function fetchImagePage(q, page) {
    const res = await fetch('/api/images', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ q, page, num: 100 })
    });
    if (!res.ok) throw new Error('image search failed');
    const data = await res.json();
    const hits = data.images || [];
    return hits.map(h => ({
      title: h.title || '',
      thumb: h.imageUrl || h.thumbnailUrl || '',
      source: h.link || h.source || '',
    })).filter(r => r.thumb);
  }

  function renderImageSkeleton() {
    const heights = [140, 190, 160, 210, 150, 180, 200, 140, 170, 220, 155, 195, 165, 185, 145, 205];
    let html = '<div class="img-grid" id="imgGrid">';
    for (let i = 0; i < 16; i++) {
      html += `<div class="img-skel" style="height:${heights[i % heights.length]}px"></div>`;
    }
    html += '</div>';
    resultsContainer.innerHTML = html;
  }

  function createImageTile(r) {
    const a = document.createElement('a');
    a.className = 'img-tile';
    a.href = r.source;
    a.rel = 'noopener noreferrer';
    a.addEventListener('click', e => {
      e.preventDefault();
      openLightbox(r.thumb, r.source);
    });
    const img = document.createElement('img');
    img.loading = 'lazy';
    img.decoding = 'async';
    img.referrerPolicy = 'no-referrer';
    img.alt = r.title ? r.title.substring(0, 80) : '';
    img.src = r.thumb;
    img.onload = () => img.classList.add('loaded');
    img.onerror = () => { if (a.parentNode) a.parentNode.removeChild(a); };
    a.appendChild(img);
    if (r.title) {
      const label = document.createElement('div');
      label.className = 'img-tile__label';
      label.textContent = r.title;
      a.appendChild(label);
    }
    return a;
  }

  function appendImageTiles(results) {
    const grid = document.getElementById('imgGrid');
    if (!grid) return 0;
    const frag = document.createDocumentFragment();
    let added = 0;
    for (const r of results) {
      if (imgState.seen.has(r.thumb)) continue;
      if (imgState.total >= MAX_IMAGES) break;
      imgState.seen.add(r.thumb);
      frag.appendChild(createImageTile(r));
      imgState.total++;
      added++;
    }
    grid.appendChild(frag);
    return added;
  }

  function setupInfiniteScroll() {
    imgObserverTeardown();
    const old = document.getElementById('imgSentinel');
    if (old && old.parentNode) old.parentNode.removeChild(old);
    const sentinel = document.createElement('div');
    sentinel.id = 'imgSentinel';
    sentinel.className = 'img-grid-sentinel';
    resultsContainer.appendChild(sentinel);
    imgObserver = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting && !imgState.loading && !imgState.done) {
        loadMoreImages();
      }
    }, { rootMargin: '800px' });
    imgObserver.observe(sentinel);
  }

  async function loadMoreImages() {
    if (imgState.loading || imgState.done || imgState.total >= MAX_IMAGES) {
      if (imgState.total >= MAX_IMAGES) imgObserverTeardown();
      return;
    }
    imgState.loading = true;
    imgState.page++;
    try {
      const results = await fetchImagePage(imgState.query, imgState.page);
      if (!results.length) {
        imgState.done = true;
        imgObserverTeardown();
      } else {
        const added = appendImageTiles(results);
        if (added === 0 || imgState.total >= MAX_IMAGES) {
          imgState.done = true;
          imgObserverTeardown();
        }
        resultStats.textContent = `About ${imgState.total} images`;
      }
    } catch (err) {
      imgState.done = true;
      imgObserverTeardown();
    }
    imgState.loading = false;
  }

  // ── Simple result cache — avoids re-fetch on tab switch ──
  const webCache = new Map();  // key: `${q}:${page}`
  const imgCache = new Map();  // key: q (stores full DOM innerHTML)

  function renderKnowledgePanel(kp) {
    if (!kp || !kp.title) return '';

    // ── Images ──
    // Serper gives kp.imageUrl (single). Build hero with up to 2 images if available.
    const imgs = [];
    if (kp.imageUrl) imgs.push(kp.imageUrl);
    // some queries return kp.images array (People-type KP)
    if (Array.isArray(kp.images)) imgs.push(...kp.images.map(i => i.imageUrl || i).filter(Boolean));
    const heroImgs = [...new Set(imgs)].slice(0, 2);

    let imageBlock = '';
    if (heroImgs.length >= 2) {
      // Yandex-style dual image hero
      imageBlock = `<div class="kp-hero">
<img src="${heroImgs[0]}" alt="" loading="lazy" referrerpolicy="no-referrer">
<img src="${heroImgs[1]}" alt="" loading="lazy" referrerpolicy="no-referrer">
</div>`;
    } else if (heroImgs.length === 1) {
      // Single image → full-width hero
      imageBlock = `<div class="kp-hero">
<img src="${heroImgs[0]}" alt="" loading="lazy" referrerpolicy="no-referrer">
</div>`;
    }

    // ── Title + type (always in body) ──
    const type = kp.type ? `<div class="kp-type">${kp.type}</div>` : '';

    // ── Description ──
    const desc = kp.description ? `<div class="kp-desc">${kp.description}</div>` : '';

    // ── Wikipedia source chip ──
    const src = kp.descriptionSource && kp.descriptionLink
      ? `<a class="kp-source" href="${kp.descriptionLink}" target="_blank" rel="noopener">
<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
${kp.descriptionSource}</a>` : '';

    // ── Facts: Serper puts structured data in kp.attributes (object) ──
    // Priority order for display
    const ATTR_LABELS = {
      'born': 'Born', 'died': 'Died', 'age': 'Age',
      'height': 'Height', 'weight': 'Weight',
      'nationality': 'Nationality', 'spouse': 'Spouse',
      'children': 'Children', 'parents': 'Parents', 'siblings': 'Siblings',
      'founded': 'Founded', 'founder': 'Founder', 'ceo': 'CEO',
      'headquarters': 'Headquarters', 'employees': 'Employees',
      'revenue': 'Revenue', 'website': 'Website',
      'president': 'President', 'capital': 'Capital', 'population': 'Population',
      'area': 'Area', 'currency': 'Currency', 'language': 'Language',
      'genre': 'Genre', 'director': 'Director', 'starring': 'Starring',
      'released': 'Released', 'runtime': 'Runtime',
    };

    let factsHtml = '';
    // Serper: kp.attributes is { "Born": "...", "Height": "..." } (capitalized keys)
    const attrs = kp.attributes || {};
    const attrEntries = Object.entries(attrs).slice(0, 8); // max 8 facts
    if (attrEntries.length) {
      factsHtml = attrEntries.map(([k, v]) => {
        // v can be string or array
        const val = Array.isArray(v) ? v.join(', ') : String(v);
        return `<div class="kp-fact"><b>${k}:</b> ${val}</div>`;
      }).join('');
    } else {
      // Fallback: check flat keys on kp object itself
      const flatKeys = Object.keys(ATTR_LABELS);
      const flatFacts = flatKeys.filter(k => kp[k]).map(k =>
        `<div class="kp-fact"><b>${ATTR_LABELS[k]}:</b> ${kp[k]}</div>`
      ).join('');
      factsHtml = flatFacts;
    }

    // ── See also chips (kp.peopleAlsoSearchFor or kp.relatedSearches) ──
    const related = kp.peopleAlsoSearchFor || kp.relatedSearches || [];
    let seeAlsoHtml = '';
    if (related.length) {
      const chips = related.slice(0, 6).map(r => {
        const name = r.name || r.query || r;
        const img = r.imageUrl || r.thumbnail || '';
        const href = `search.html?q=${encodeURIComponent(name)}`;
        return `<a class="kp-seealso-chip" href="${href}">
${img ? `<img src="${img}" alt="" loading="lazy" referrerpolicy="no-referrer">` : `<div style="width:80px;height:56px;border-radius:8px;background:#f1f3f4;border:1px solid #ebebeb"></div>`}
<span>${name}</span>
</a>`;
      }).join('');
      seeAlsoHtml = `<div class="kp-seealso">
<div class="kp-seealso-title">See also</div>
<div class="kp-seealso-row">${chips}</div>
</div>`;
    }

    return `<div class="kp">
${imageBlock}
<div class="kp-body">
<div class="kp-title">${kp.title}</div>
${type}
${desc}
${src}
${factsHtml ? `<div class="kp-facts">${factsHtml}</div>` : ''}
${seeAlsoHtml}
</div>
</div>`;
  }

  async function runImageSearch(q) {
    // Return from cache if available
    if (imgCache.has(q)) {
      resultsContainer.innerHTML = imgCache.get(q).html;
      resultStats.textContent = imgCache.get(q).stats;
      // Re-attach sentinel for infinite scroll if not done
      const cached = imgCache.get(q);
      if (!cached.done) setupInfiniteScroll();
      return;
    }
    imgObserverTeardown();
    imgState = { query: q, page: 1, loading: true, done: false, seen: new Set(), total: 0 };
    renderImageSkeleton();
    resultStats.textContent = '';
    try {
      const results = await fetchImagePage(q, 1);
      if (!results.length) { renderNoResults(q); imgState.loading = false; return; }
      const grid = document.getElementById('imgGrid');
      if (grid) grid.innerHTML = '';
      appendImageTiles(results);
      resultStats.textContent = `About ${imgState.total} images`;
      imgState.loading = false;
      if (!imgState.done && imgState.total < MAX_IMAGES) setupInfiniteScroll();
    } catch (err) {
      renderNoResults(q, true);
      imgState.loading = false;
    }
  }

  async function runSearch(q, page) {
    currentQuery = q;
    currentPage = page || 1;
    resultStats.textContent = '';
    pagerEl.innerHTML = '';

    if (currentMode === 'images') {
      runImageSearch(q);
      return;
    }

    // Web cache hit
    const cacheKey = `${q}:${currentPage}`;
    if (webCache.has(cacheKey)) {
      const cached = webCache.get(cacheKey);
      resultsContainer.innerHTML = cached.html;
      resultStats.textContent = cached.stats;
      pagerEl.innerHTML = cached.pager;
      // Re-attach pager click events
      pagerEl.querySelectorAll('.pg:not([disabled])').forEach(btn => {
        btn.addEventListener('click', () => {
          const p = parseInt(btn.dataset.page, 10);
          if (!p || p === currentPage) return;
          const params = new URLSearchParams(window.location.search);
          params.set('q', currentQuery); params.set('page', p);
          window.history.pushState({}, '', 'search.html?' + params.toString());
          runSearch(currentQuery, p);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      });
      return;
    }

    renderSkeleton();
    // Retry helper: Cloudflare cold starts or Serper first-hit can return empty on page load.
    // We silently retry once before showing "no results".
    async function fetchWithRetry(query, pg, retries = 1) {
      for (let attempt = 0; attempt <= retries; attempt++) {
        try {
          const data = await searxSearch(query, pg);
          if (data.results.length || attempt === retries) return data;
          // Brief pause before retry
          await new Promise(r => setTimeout(r, 800));
        } catch (err) {
          if (attempt === retries) throw err;
          await new Promise(r => setTimeout(r, 800));
        }
      }
    }
    try {
      const { results, totalhits, kp } = await fetchWithRetry(q, currentPage);
      if (!results.length) { renderNoResults(q); return; }
      renderStats(totalhits);
      const kpHtml = renderKnowledgePanel(kp);
      renderCards(results, kpHtml);
      renderPager(currentPage, totalhits);
      // Cache
      webCache.set(cacheKey, {
        html: resultsContainer.innerHTML,
        stats: resultStats.textContent,
        pager: pagerEl.innerHTML
      });
    } catch (err) {
      renderNoResults(q, true);
    }
  }

  function renderSkeleton() {
    let html = '';
    for (let i = 0; i < 6; i++) {
      html += `<div class="skel-card">
<div style="width:32px;height:32px;border-radius:50%;background:#f0f0f0;margin-bottom:10px"></div>
<div style="width:52%;height:15px;border-radius:4px;background:#f0f0f0;margin-bottom:8px"></div>
<div style="width:80%;height:14px;border-radius:4px;background:#f0f0f0;margin-bottom:6px"></div>
<div style="width:65%;height:14px;border-radius:4px;background:#f0f0f0"></div>
</div>`;
    }
    resultsContainer.innerHTML = html;
  }

  function renderStats(totalhits) {
    if (!totalhits) { resultStats.textContent = ''; return; }
    resultStats.textContent = `About ${totalhits.toLocaleString('en-US')} results`;
  }

  function renderCards(results, kpHtml) {
    const cardsHtml = results.map((r, idx) => {
      let domain = '', pathBreadcrumb = '', displayName = '';
      try {
        const u = new URL(r.url);
        domain = u.hostname.replace(/^www\./, '');
        displayName = domain.split('.')[0];
        displayName = displayName.charAt(0).toUpperCase() + displayName.slice(1);
        const segs = u.pathname.split('/').filter(Boolean);
        pathBreadcrumb = segs.length ? `${domain} › ${segs.join(' › ')}` : domain;
      } catch (e) {
        domain = r.url || '';
        displayName = domain;
        pathBreadcrumb = domain;
      }
      // Every 3rd result that has a thumbnail gets the big Yandex-style preview treatment;
      // the rest stay compact with a small side thumbnail (or no thumbnail at all).
      const useBigPreview = r.thumb && (idx % 3 === 1);
      const smallThumbHtml = (r.thumb && !useBigPreview)
? `<img class="r-thumb" src="${r.thumb}" alt="" loading="lazy" referrerpolicy="no-referrer">`
: '';
      const bigPreviewHtml = useBigPreview
? `<a href="${r.url}" target="_blank" rel="noopener" class="r-preview">
<img src="${r.thumb}" alt="" loading="lazy" referrerpolicy="no-referrer">
<span class="r-preview__play"><svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M8 5v14l11-7z"/></svg></span>
</a>`
: '';
      return `
<div class="card">
<div class="card-body">
<div class="card-content">
<div class="r-host">
<div class="r-fav" style="background-image:url('https://www.google.com/s2/favicons?domain=${domain}&sz=64')"></div>
<div class="r-host-text">
<span class="r-domain">${displayName}</span>
<span class="r-path">${pathBreadcrumb}</span>
</div>
<button class="r-dots">
<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
</button>
</div>
<a href="${r.url}" target="_blank" rel="noopener" class="r-title">${r.title}</a>
${bigPreviewHtml}
<a href="${r.url}" target="_blank" rel="noopener" class="r-snip">${r.snippet || 'No preview available.'}</a>
</div>
          ${smallThumbHtml}
</div>
</div>`;
    }).join('');
    resultsContainer.innerHTML = (kpHtml || '') + cardsHtml;
  }


  function renderNoResults(q, isError) {
    resultsContainer.innerHTML = `
<div class="no-results">
<div class="no-results__icon">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" width="40" height="40"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
</div>
<div class="no-results__title">${isError ? "Couldn't reach search" : `No results for "${q}"`}</div>
<div class="no-results__sub">${isError ? 'Check your connection and try again.' : 'Try different or more general keywords.'}</div>
</div>`;
    resultStats.textContent = '';
  }

  function renderPager(page, totalhits) {
    const totalPages = Math.max(1, Math.ceil(totalhits / PAGE_SIZE));
    const maxPage = Math.min(totalPages, 20);
    const windowStart = Math.max(1, Math.min(page - 2, maxPage - 4));
    const windowEnd = Math.min(maxPage, windowStart + 4);
    let html = '';
    html += `<button class="pg" ${page <= 1 ? 'disabled' : ''} data-page="${page - 1}">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="15 18 9 12 15 6"/></svg>
</button>`;
    for (let i = windowStart; i <= windowEnd; i++) {
      html += `<button class="pg ${i === page ? 'on' : ''}" data-page="${i}">${i}</button>`;
    }
    html += `<button class="pg" ${page >= maxPage ? 'disabled' : ''} data-page="${page + 1}">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="9 18 15 12 9 6"/></svg>
</button>`;
    pagerEl.innerHTML = html;
    pagerEl.querySelectorAll('.pg:not([disabled])').forEach(btn => {
      btn.addEventListener('click', () => {
        const p = parseInt(btn.dataset.page, 10);
        if (!p || p === page) return;
        const params = new URLSearchParams(window.location.search);
        params.set('q', currentQuery);
        params.set('page', p);
        window.history.pushState({}, '', 'search.html?' + params.toString());
        runSearch(currentQuery, p);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  inp.addEventListener('input', function () {
    const q = this.value.trim();
    xBtn.classList.toggle('show', q.length > 0);
    clearTimeout(tmr);
    if (!q) { hide(); return; }
    tmr = setTimeout(async () => render(await fetchSug(q)), 180);
  });

  xBtn.addEventListener('click', () => {
    inp.value = '';
    xBtn.classList.remove('show');
    hide();
    inp.focus();
  });

  inp.addEventListener('keydown', e => {
    const rows = sugBox.querySelectorAll('.sug-row');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      active = Math.min(active + 1, rows.length - 1);
      hi(rows);
      if (rows[active]) inp.value = rows[active].dataset.v;
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      active = Math.max(active - 1, -1);
      hi(rows);
    } else if (e.key === 'Enter') {
      hide();
      const q = inp.value.trim();
      if (q) window.location.href = 'search.html?q=' + encodeURIComponent(q);
    } else if (e.key === 'Escape') {
      hide();
    }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.pill-wrap')) hide();
  });

  function hi(r) { r.forEach((x, i) => x.classList.toggle('hl', i === active)); }
  function hide() { sugBox.classList.remove('show'); active = -1; }
  function show() { sugBox.classList.add('show'); }

  function fetchSug(q) {
    return new Promise(res => {
      const cb = '_s' + Date.now(), s = document.createElement('script');
      s.src = `https://suggestqueries.google.com/complete/search?client=firefox&q=${encodeURIComponent(q)}&callback=${cb}`;
      window[cb] = d => { res(d[1] || []); delete window[cb]; s.remove(); };
      s.onerror = () => { res([]); s.remove(); };
      document.head.appendChild(s);
    });
  }

  function render(items) {
    if (!items.length) { hide(); return; }
    sugBox.innerHTML = items.slice(0, 6).map(s =>
      `<button class="sug-row" data-v="${s.replace(/"/g, '&quot;')}" onmousedown="pick(this)">
<span class="sug-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>${s}
</button>`
    ).join('');
    show(); active = -1;
  }

  function pick(el) { inp.value = el.dataset.v; hide(); }
</script>
</body>
</html>
