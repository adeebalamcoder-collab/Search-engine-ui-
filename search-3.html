<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>hey — Atkyn Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html {
      scroll-behavior: smooth;
    }

    html, body {
      font-family: Arial, Helvetica, sans-serif;
      background: #EBEBEB;
      color: #000;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior-y: contain;
      -webkit-overflow-scrolling: touch;
    }

    img, svg { will-change: auto; }
    .r-card, .nav-tab, .r-title, .r-snip, .r-dots, .pg, .hamburger {
      -webkit-tap-highlight-color: transparent;
    }

    /* ══════════════════════════
       HEADER
    ══════════════════════════ */
    .header {
      position: relative;
      background: #fff;
    }

    /* ROW 1: just the hamburger, right-aligned */
    .h-row1 {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      height: 64px;
      padding: 0 14px 0 0;
    }

    .hamburger {
      border: none; background: none;
      cursor: pointer;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.5px;
      padding: 12px;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      isolation: isolate;
    }
    .hamburger::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      border-radius: 50%;
      background: rgba(0,0,0,0.08);
      transform: translate(-50%, -50%);
      transition: width 0.32s ease, height 0.32s ease;
      z-index: -1;
    }
    .hamburger:active::before {
      width: 130%;
      height: 130%;
      transition: width 0.05s ease, height 0.05s ease;
    }
    .hamburger span {
      display: block;
      width: 10px; height: 10px;
      background: linear-gradient(145deg, #5a5a5a, #2e2e2e);
      border-radius: 3px;
    }

    /* ROW 2: full-width floating pill */
    .h-row2 {
      padding: 0 12px 10px 12px;
    }

    .pill-wrap {
      position: relative;
      width: 100%;
    }

    /* Big floating pill — full width */
    .pill {
      display: flex;
      align-items: center;
      height: 60px;
      border: 2.0px solid #0072B1;
      border-radius: 9999px;
      padding: 0 16px 0 5px;
      background: #fff;
      gap: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    /* Logo circle */
    .pill-logo {
      flex-shrink: 0;
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      user-select: none;
      position: relative;
    }
    .pill-logo svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .pill input {
      flex: 1; min-width: 0;
      border: none; outline: none;
      background: transparent;
      font-size: 1.125rem;
      font-family: Arial, Helvetica, sans-serif;
      color: #000;
      caret-color: #0072B1;
    }
    .pill input[type=search]::-webkit-search-cancel-button { display: none; }
    .pill input[type=search]::-webkit-search-decoration { display: none; }

    /* X clear button */
    .pill-x {
      display: none;
      border: none; background: none;
      cursor: pointer;
      color: #9e9e9e;
      line-height: 0;
      padding: 8px;
      flex-shrink: 0;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      isolation: isolate;
    }
    .pill-x::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      border-radius: 50%;
      background: rgba(0,0,0,0.08);
      transform: translate(-50%, -50%);
      transition: width 0.32s ease, height 0.32s ease;
      z-index: -1;
    }
    .pill-x:active::before {
      width: 160%;
      height: 160%;
      transition: width 0.05s ease, height 0.05s ease;
    }
    .pill-x.show { display: flex; }
    .pill-x svg { width: 26px; height: 26px; }

    /* ══════════════════════════
       TABS — premium equal rectangular chips
    ══════════════════════════ */
    .h-nav {
      display: flex;
      align-items: center;
      height: auto;
      padding: 2px 14px 2px 14px;
      gap: 2px;
      overflow-x: auto;
      scrollbar-width: none;
      background: #fff;
    }
    .h-nav::-webkit-scrollbar { display: none; }

    .nav-tab {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 12px 8px;
      font-size: 1.05rem;
      font-weight: 500;
      white-space: nowrap;
      text-decoration: none;
      cursor: pointer;
      border-radius: 6px;
      border: none;
      background: #fff;
      color: #333;
      letter-spacing: 0;
      line-height: 1;
      text-transform: capitalize;
      -webkit-font-smoothing: antialiased;
      box-shadow: none;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s ease, background 0.1s ease, color 0.1s ease;
      user-select: none;
    }
    .nav-tab:active {
      transform: scale(0.93);
      background: #e8e8e8;
    }
    .nav-tab.on {
      background: #fff;
      color: #111;
      font-weight: 700;
    }
    .nav-tab.on:active {
      transform: scale(0.93);
      background: #e8e8e8;
    }

    /* ══════════════════════════
       BODY OFFSET
       h-row1(40) + pill-row(52+8+8=68 approx) + tabs(44) = 152
    ══════════════════════════ */
    body { padding-top: 0; }
    .page { padding-bottom: 16px; -webkit-overflow-scrolling: touch; contain: layout style paint; transform: translateZ(0); }

    /* ══════════════════════════
       CARDS
    ══════════════════════════ */
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 12px 14px 14px 14px;
      margin: 6px 8px 0 8px;
      position: relative;
      overflow: visible;
      content-visibility: auto;
      contain-intrinsic-size: 0 120px;
    }

    /* Card body: text column + optional thumbnail */
    .card-body {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .card-content { flex: 1; min-width: 0; }

    .r-thumb {
      flex-shrink: 0;
      width: 84px;
      height: 84px;
      border-radius: 10px;
      object-fit: contain;
      background: #f1f3f4;
      display: block;
    }
    @media (min-width: 900px) {
      .r-thumb { width: 110px; height: 110px; }
    }

    /* Source row */
    .r-host {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .r-fav {
      width: 30px; height: 30px;
      min-width: 30px; min-height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #f1f3f4 center/20px 20px no-repeat;
      display: block;
    }

    .r-host-text {
      flex: 1; min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .r-domain {
      font-size: 0.875rem;
      font-weight: 400;
      color: #222;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .r-path {
      font-size: 0.775rem;
      color: #888;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .r-dots {
      flex-shrink: 0;
      border: none; background: none;
      cursor: pointer;
      color: #aaa;
      line-height: 0;
      padding: 6px;
      align-self: flex-start;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      isolation: isolate;
      margin: -6px -6px 0 0;
    }
    .r-dots::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      border-radius: 50%;
      background: rgba(0,0,0,0.08);
      transform: translate(-50%, -50%);
      transition: width 0.32s ease, height 0.32s ease;
      z-index: -1;
    }
    .r-dots:active::before {
      width: 160%;
      height: 160%;
      transition: width 0.05s ease, height 0.05s ease;
    }
    .r-dots svg { width: 20px; height: 20px; }

    /* Title — bold, navy */
    .r-title {
      display: block;
      font-size: 1.065rem;
      font-weight: 700;
      color: #08519C;
      text-decoration: none;
      line-height: 1.35;
      margin: 5px 0 5px;
      -webkit-tap-highlight-color: transparent;
    }
    .r-title:hover { text-decoration: underline; }

    /* Snippet */
    .r-snip {
      display: block;
      font-size: 0.92rem;
      color: #202A44;
      line-height: 1.58;
      text-decoration: none;
      cursor: pointer;
      margin: 0 -8px;
      padding: 2px 8px;
      border-radius: 8px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s ease;
    }
    .r-snip:active {
      background: rgba(0,0,0,0.08);
      transition: background 0.05s ease;
    }
    .r-snip b, .r-snip .searchmatch { font-weight: 700; color: #202A44; font-style: normal; }

    /* ══════════════════════════
       RESULT STATS / SKELETON / NO-RESULTS
    ══════════════════════════ */
    .result-stats {
      font-size: 0.82rem;
      color: #70757a;
      padding: 10px 16px 2px;
    }
    @media (min-width: 900px) { .result-stats { padding: 14px 0 0; max-width: 640px; } }

    .skel-card {
      background: #fff;
      border-radius: 14px;
      padding: 12px 14px 14px 14px;
      margin: 6px 8px 0 8px;
    }
    @media (min-width: 900px) { .skel-card { max-width: 640px; margin: 20px 0 0 0; padding: 16px 20px 18px; border-radius: 10px; } }
    .skel-line {
      height: 12px;
      border-radius: 6px;
      background: linear-gradient(90deg, #eceff1 25%, #f6f7f8 37%, #eceff1 63%);
      background-size: 400% 100%;
      animation: skel-sweep 1.4s ease infinite;
      margin-bottom: 8px;
    }
    @keyframes skel-sweep {
      0% { background-position: 100% 50%; }
      100% { background-position: 0 50%; }
    }
    .skel-title { width: 55%; height: 16px; }
    .skel-host { width: 35%; height: 11px; margin-bottom: 10px; }
    .skel-snip { width: 100%; }
    .skel-snip.short { width: 70%; margin-bottom: 0; }

    .no-results {
      text-align: center;
      padding: 60px 24px;
      color: #5f6368;
    }
    .no-results__icon { color: #c2c6cf; margin-bottom: 12px; }
    .no-results__title { font-size: 1.15rem; font-weight: 700; color: #202124; margin-bottom: 6px; }
    .no-results__sub { font-size: 0.92rem; color: #70757a; }

    /* ══════════════════════════
       FOOTER
    ══════════════════════════ */
    .end-foot {
      text-align: left;
      padding: 14px 24px 16px;
    }
    .end-foot__eyebrow {
      font-size: 1.15rem;
      font-weight: 700;
      color: #8a8f99;
      margin-bottom: 6px;
    }
    .end-foot__title {
      font-size: 1.85rem;
      font-weight: 800;
      color: #c2c6cf;
      line-height: 1.2;
      margin-bottom: 16px;
    }
    .end-foot__btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 28px;
      border: none;
      border-radius: 10px;
      background: #0072B1;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.1px;
      text-decoration: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 2px 0 rgba(0,80,124,0.4);
      transition: background 0.15s ease, transform 0.08s ease, box-shadow 0.15s ease;
    }
    .end-foot__btn:active {
      background: #00628f;
      transform: scale(0.96);
      box-shadow: 0 1px 0 rgba(0,80,124,0.4);
    }

    .end-brand {
      margin: 0;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px));
      text-align: center;
    }
    .end-brand__logo {
      font-size: 1.1rem;
      font-weight: 800;
      color: #111;
      letter-spacing: 0.3px;
      margin-bottom: 3px;
    }
    .end-brand__by {
      font-size: 0.78rem;
      color: #9aa0ab;
      margin-bottom: 6px;
    }
    .end-brand__copy {
      font-size: 0.75rem;
      color: #aeb3bd;
    }

    /* ══════════════════════════
       PAGINATION
    ══════════════════════════ */
    .pager {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 20px 8px 14px;
    }
    .pg {
      min-width: 38px; height: 38px;
      border: none; background: none;
      cursor: pointer; border-radius: 50%;
      font-size: 0.9rem;
      color: #555;
      display: flex; align-items: center; justify-content: center;
      font-family: Arial, sans-serif;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      isolation: isolate;
    }
    .pg::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      border-radius: 50%;
      background: rgba(0,0,0,0.08);
      transform: translate(-50%, -50%);
      transition: width 0.32s ease, height 0.32s ease;
      z-index: -1;
    }
    .pg:active::before { width: 160%; height: 160%; transition: width 0.05s ease, height 0.05s ease; }
    .pg.on::before { background: rgba(255,255,255,0.25); }
    .pg.on { background: #0072B1; color: #fff; font-weight: 700; }
    .pg:hover:not(.on):not([disabled]) { background: #f0f0f0; }
    .pg[disabled] { opacity: .3; cursor: default; }
    .pg-dot { color: #888; font-size: 0.9rem; padding: 0 3px; }

    /* ══════════════════════════
       SUGGESTIONS
    ══════════════════════════ */
    .sug {
      position: absolute;
      top: calc(100% + 3px);
      left: 0; right: 0;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,.18);
      overflow: hidden;
      z-index: 200;
      opacity: 0; pointer-events: none;
      transform: translateY(-4px);
      transition: opacity .12s, transform .12s;
    }
    .sug.show { opacity: 1; pointer-events: all; transform: none; }
    .sug-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 0.9375rem;
      border: none; background: none;
      width: 100%; text-align: left;
      font-family: Arial, sans-serif; color: #000;
    }
    .sug-row + .sug-row { border-top: 1px solid #f0f2f4; }
    .sug-row:hover, .sug-row.hl { background: #f8f9fa; }
    .sug-ico { color: #bdc1c6; line-height: 0; flex-shrink: 0; }
    .sug-ico svg { width: 16px; height: 16px; }

    /* Desktop-slot hamburger stays hidden on mobile; media query below reveals it */
    .hamburger-desktop-slot { display: none; }

    /* ══════════════════════════
       DESKTOP (Yandex/Bing-style wide layout)
       Kicks in at 900px+ (covers real desktops AND
       "Desktop site" mode on phones, which usually reports
       ~980px viewport width). Header becomes one inline row:
       pill + tabs + hamburger, centered in a generous column.
    ══════════════════════════ */
    @media (min-width: 900px) {
      body { background: #fff; }

      .h-row1 { display: none; }

      .header { border-bottom: 1px solid #e6e6e6; }
      .header-inner {
        max-width: 900px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        gap: 24px;
        padding: 14px 24px;
      }

      .h-row2 { padding: 0; flex-shrink: 0; width: 480px; }
      .pill { height: 46px; border-width: 1.5px; }
      .pill-logo { width: 34px; height: 34px; }
      .pill input { font-size: 1rem; }
      .pill-x svg { width: 20px; height: 20px; }

      .h-nav { padding: 0; gap: 4px; flex: 1; overflow: visible; }
      .nav-tab { font-size: 0.9rem; padding: 8px 12px; border-radius: 8px; }
      .nav-tab:hover { background: #f0f0f0; }
      .nav-tab.on { background: #e8f2fa; color: #0072B1; }
      .nav-tab.on:hover { background: #dcecf7; }

      .hamburger-desktop-slot { display: flex; flex-shrink: 0; }

      .page { max-width: 900px; margin: 0 auto; padding: 0 24px 32px; }

      /* Results column: aligned with header's left edge, comfortable reading width */
      .card {
        max-width: 640px;
        margin: 20px 0 0 0;
        padding: 16px 20px 18px;
        border-radius: 10px;
        box-shadow: none;
        transition: box-shadow 0.15s ease;
      }
      .card:hover { box-shadow: 0 1px 8px rgba(0,0,0,0.08); }
      .r-title { font-size: 1.2rem; }
      .r-snip { font-size: 1rem; cursor: default; }
      .r-snip:active, .r-snip:hover { background: transparent; }

      .end-foot, .end-brand { max-width: 640px; }
      .pager { justify-content: flex-start; padding-left: 4px; }
    }
  </style>
</head>
<body>

<header class="header">

  <!-- Row 1: Hamburger only, top-right -->
  <div class="h-row1">
    <button class="hamburger" aria-label="Menu">
      <span></span><span></span><span></span><span></span>
    </button>
  </div>

  <!-- Desktop wraps row2 + nav into one inline row; mobile ignores this wrapper -->
  <div class="header-inner">

    <!-- Row 2: Full-width pill -->
    <div class="h-row2">
      <div class="pill-wrap">
        <div class="pill">
          <div class="pill-logo">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <circle cx="50" cy="50" r="49" fill="#ffffff"/>
              <circle cx="46" cy="46" r="22" fill="none" stroke="#0072B1" stroke-width="9"/>
              <line x1="62" y1="62" x2="72" y2="72" stroke="#0072B1" stroke-width="9.5" stroke-linecap="round"/>
            </svg>
          </div>
          <input id="q" type="search" value="hey" autocomplete="off" spellcheck="false">
          <button class="pill-x show" id="xBtn">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
          </button>
        </div>
        <div class="sug" id="sugBox"></div>
      </div>
    </div>

    <!-- Row 3: Category tabs -->
    <nav class="h-nav">
      <a href="#" class="nav-tab on">web</a>
      <a href="#" class="nav-tab">AI</a>
      <a href="#" class="nav-tab">images</a>
      <a href="#" class="nav-tab">video</a>
      <a href="#" class="nav-tab">maps</a>
      <a href="#" class="nav-tab">news</a>
    </nav>

    <!-- Hamburger: mobile shows it in its own top row (.h-row1); desktop shows this one inline at the end -->
    <button class="hamburger hamburger-desktop-slot" aria-label="Menu">
      <span></span><span></span><span></span><span></span>
    </button>

  </div>

</header>

<div class="page">

  <div class="result-stats" id="resultStats"></div>

  <div id="resultsContainer">
    <!-- JS-rendered: skeleton, real Wikipedia cards, or no-results state -->
  </div>

  <!-- Pagination -->
  <div class="pager" id="pager"></div>

  <!-- End of results footer -->
  <div class="end-foot">
    <div class="end-foot__eyebrow">That's all for now!</div>
    <div class="end-foot__title">Didn't find what you're looking for?</div>
    <a href="javascript:void(0)" class="end-foot__btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" width="17" height="17"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Search Now
    </a>
  </div>

  <div class="end-brand">
    <div class="end-brand__logo">Atkyn</div>
    <div class="end-brand__by">by Canacot Systems</div>
    <div class="end-brand__copy">© 2026 Atkyn. All rights reserved.</div>
  </div>

</div>


<script>
  const inp = document.getElementById('q');
  const xBtn = document.getElementById('xBtn');
  const sugBox = document.getElementById('sugBox');
  const resultsContainer = document.getElementById('resultsContainer');
  const resultStats = document.getElementById('resultStats');
  const pagerEl = document.getElementById('pager');
  let active = -1, tmr;

  const PAGE_SIZE = 10;
  let currentQuery = '';
  let currentPage = 1;

  // ── Kick off a real search from the ?q= param on load ──
  (function initFromQuery() {
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q');
    const p = parseInt(params.get('page'), 10) || 1;
    if (q) {
      inp.value = q;
      document.title = q + ' — Atkyn Search';
      if (xBtn) xBtn.classList.add('show');
      runSearch(q, p);
    } else {
      resultsContainer.innerHTML = '';
    }
  })();

  // ── Wikipedia REST/Action API — free, no key required ──
  async function wikiSearch(q, offset) {
    const searchUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&srlimit=${PAGE_SIZE}&sroffset=${offset}&srprop=snippet|wordcount&srinfo=totalhits&format=json&origin=*`;
    const res = await fetch(searchUrl);
    if (!res.ok) throw new Error('search failed');
    const data = await res.json();
    const hits = (data.query && data.query.search) || [];
    const totalhits = (data.query && data.query.searchinfo && data.query.searchinfo.totalhits) || 0;
    if (!hits.length) return { results: [], totalhits };

    // Second call: real thumbnail images + canonical URLs for each title
    const titles = hits.map(h => h.title).join('|');
    const infoUrl = `https://en.wikipedia.org/w/api.php?action=query&prop=pageimages|info&inprop=url&piprop=thumbnail&pithumbsize=300&titles=${encodeURIComponent(titles)}&format=json&origin=*`;
    let infoByTitle = {};
    try {
      const infoRes = await fetch(infoUrl);
      const infoData = await infoRes.json();
      const pages = (infoData.query && infoData.query.pages) || {};
      Object.values(pages).forEach(p => { infoByTitle[p.title] = p; });
    } catch (e) { /* thumbnails are a nice-to-have, search still works without */ }

    const results = hits.map(h => {
      const info = infoByTitle[h.title] || {};
      return {
        title: h.title,
        snippet: h.snippet || '',
        url: info.fullurl || ('https://en.wikipedia.org/wiki/' + encodeURIComponent(h.title.replace(/ /g, '_'))),
        thumb: info.thumbnail ? info.thumbnail.source : null
      };
    });
    return { results, totalhits };
  }

  // ── SearXNG — free, no key, real web links from Google/Bing/DuckDuckGo etc ──
  const SEARX_INSTANCE = 'https://searx.be';
  async function searxSearch(q, page) {
    const url = `${SEARX_INSTANCE}/search?q=${encodeURIComponent(q)}&format=json&pageno=${page}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('search failed');
    const data = await res.json();
    const hits = data.results || [];
    const results = hits.slice(0, PAGE_SIZE).map(h => ({
      title: h.title || h.url,
      snippet: h.content || '',
      url: h.url,
      thumb: h.img_src || h.thumbnail || null
    }));
    // SearXNG doesn't return a total count, so we fake a "many results" stat
    return { results, totalhits: results.length ? 1000000 : 0 };
  }

  async function runSearch(q, page) {
    currentQuery = q;
    currentPage = page || 1;
    renderSkeleton();
    resultStats.textContent = '';
    pagerEl.innerHTML = '';
    try {
      const { results, totalhits } = await searxSearch(q, currentPage);
      if (!results.length) { renderNoResults(q); return; }
      renderStats(totalhits);
      renderCards(results);
      renderPager(currentPage, totalhits);
    } catch (err) {
      renderNoResults(q, true);
    }
  }

  function renderSkeleton() {
    let html = '';
    for (let i = 0; i < 5; i++) {
      html += `
        <div class="skel-card">
          <div class="skel-line skel-host"></div>
          <div class="skel-line skel-title"></div>
          <div class="skel-line skel-snip"></div>
          <div class="skel-line skel-snip short"></div>
        </div>`;
    }
    resultsContainer.innerHTML = html;
  }

  function renderStats(totalhits) {
    if (!totalhits) { resultStats.textContent = ''; return; }
    resultStats.textContent = `About ${totalhits.toLocaleString('en-US')} results`;
  }

  function renderCards(results) {
    resultsContainer.innerHTML = results.map(r => {
      let domain = '', pathBreadcrumb = '', displayName = '';
      try {
        const u = new URL(r.url);
        domain = u.hostname.replace(/^www\./, '');
        displayName = domain.split('.')[0];
        displayName = displayName.charAt(0).toUpperCase() + displayName.slice(1);
        const segs = u.pathname.split('/').filter(Boolean);
        pathBreadcrumb = segs.length ? `${domain} › ${segs.join(' › ')}` : domain;
      } catch (e) {
        domain = r.url || '';
        displayName = domain;
        pathBreadcrumb = domain;
      }
      const thumbHtml = r.thumb
        ? `<img class="r-thumb" src="${r.thumb}" alt="" loading="lazy" referrerpolicy="no-referrer">`
        : '';
      return `
      <div class="card">
        <div class="card-body">
          <div class="card-content">
            <div class="r-host">
              <div class="r-fav" style="background-image:url('https://www.google.com/s2/favicons?domain=${domain}&sz=64')"></div>
              <div class="r-host-text">
                <span class="r-domain">${displayName}</span>
                <span class="r-path">${pathBreadcrumb}</span>
              </div>
              <button class="r-dots">
                <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
              </button>
            </div>
            <a href="${r.url}" target="_blank" rel="noopener" class="r-title">${r.title}</a>
            <a href="${r.url}" target="_blank" rel="noopener" class="r-snip">${r.snippet || 'No preview available.'}</a>
          </div>
          ${thumbHtml}
        </div>
      </div>`;
    }).join('');
  }

  function renderNoResults(q, isError) {
    resultsContainer.innerHTML = `
      <div class="no-results">
        <div class="no-results__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" width="40" height="40"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <div class="no-results__title">${isError ? "Couldn't reach Wikipedia" : `No results for "${q}"`}</div>
        <div class="no-results__sub">${isError ? 'Check your connection and try again.' : 'Try different or more general keywords.'}</div>
      </div>`;
    resultStats.textContent = '';
  }

  function renderPager(page, totalhits) {
    const totalPages = Math.max(1, Math.ceil(totalhits / PAGE_SIZE));
    const maxPage = Math.min(totalPages, 20); // Wikipedia search practically usable up to here
    const windowStart = Math.max(1, Math.min(page - 2, maxPage - 4));
    const windowEnd = Math.min(maxPage, windowStart + 4);

    let html = '';
    html += `<button class="pg" ${page <= 1 ? 'disabled' : ''} data-page="${page - 1}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="15 18 9 12 15 6"/></svg>
    </button>`;
    for (let i = windowStart; i <= windowEnd; i++) {
      html += `<button class="pg ${i === page ? 'on' : ''}" data-page="${i}">${i}</button>`;
    }
    html += `<button class="pg" ${page >= maxPage ? 'disabled' : ''} data-page="${page + 1}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="9 18 15 12 9 6"/></svg>
    </button>`;
    pagerEl.innerHTML = html;

    pagerEl.querySelectorAll('.pg:not([disabled])').forEach(btn => {
      btn.addEventListener('click', () => {
        const p = parseInt(btn.dataset.page, 10);
        if (!p || p === page) return;
        const params = new URLSearchParams(window.location.search);
        params.set('q', currentQuery);
        params.set('page', p);
        window.history.pushState({}, '', 'search.html?' + params.toString());
        runSearch(currentQuery, p);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  inp.addEventListener('input', function () {
    const q = this.value.trim();
    xBtn.classList.toggle('show', q.length > 0);
    clearTimeout(tmr);
    if (!q) { hide(); return; }
    tmr = setTimeout(async () => render(await fetchSug(q)), 180);
  });

  xBtn.addEventListener('click', () => {
    inp.value = '';
    xBtn.classList.remove('show');
    hide();
    inp.focus();
  });

  inp.addEventListener('keydown', e => {
    const rows = sugBox.querySelectorAll('.sug-row');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      active = Math.min(active + 1, rows.length - 1);
      hi(rows);
      if (rows[active]) inp.value = rows[active].dataset.v;
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      active = Math.max(active - 1, -1);
      hi(rows);
    } else if (e.key === 'Enter') {
      hide();
      const q = inp.value.trim();
      if (q) window.location.href = 'search.html?q=' + encodeURIComponent(q);
    } else if (e.key === 'Escape') {
      hide();
    }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.pill-wrap')) hide();
  });

  function hi(r) { r.forEach((x, i) => x.classList.toggle('hl', i === active)); }
  function hide() { sugBox.classList.remove('show'); active = -1; }
  function show() { sugBox.classList.add('show'); }

  function fetchSug(q) {
    return new Promise(res => {
      const cb = '_s' + Date.now(), s = document.createElement('script');
      s.src = `https://suggestqueries.google.com/complete/search?client=firefox&q=${encodeURIComponent(q)}&callback=${cb}`;
      window[cb] = d => { res(d[1] || []); delete window[cb]; s.remove(); };
      s.onerror = () => { res([]); s.remove(); };
      document.head.appendChild(s);
    });
  }

  function render(items) {
    if (!items.length) { hide(); return; }
    sugBox.innerHTML = items.slice(0, 6).map(s =>
      `<button class="sug-row" data-v="${s.replace(/"/g, '&quot;')}" onmousedown="pick(this)">
        <span class="sug-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>${s}
      </button>`
    ).join('');
    show(); active = -1;
  }

  function pick(el) { inp.value = el.dataset.v; hide(); }

</script>
</body>
</html>
